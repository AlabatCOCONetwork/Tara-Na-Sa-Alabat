<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Alabat Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* --- LOCAL FONT --- */
        @font-face {
            font-family: 'Barabara';
            src: url('BARABARA-final.otf') format('opentype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #ffffff;
            color: #222;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

      /* --- BACKGROUND PHOTO EFFECT --- */
body::before {
    content: "";
    position: fixed;
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100vh; 
    z-index: -1;
    opacity: 0.15;
    
    /* This forces the center */
    display: flex;
    align-items: center;
    justify-content: center;

    /* We use mask/background logic that is rock-solid */
    background-image: url('ariya.jpg');
    background-repeat: no-repeat;
    background-position: center center;
    
    /* 'contain' ensures it fits the screen, 
       '80%' ensures it doesn't touch the edges */
    background-size: contain;
    
    /* Fix for mobile jumping/moving */
    pointer-events: none;
    will-change: transform;
}

        /* --- BRANDED PATTERN TOP BAR (STANDARDIZED) --- */
        .top-accent {
            height: 40px;
            background-image: url('topper.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 4000;
            border-bottom: 0px solid #fff;
        }

        /* --- HEADER & BRANDING (STANDARDIZED) --- */
        header {
            height: 125px;
            padding-top: 40px; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.98)), url('background.jpg');
            background-size: cover;
            background-position: center;
            width: 100%;
            position: relative;
            border-bottom: 1px solid #eee;
        }
        .nav-logo { height: 60px; width: auto; }
        .ariya-badge { width: 55px; position: absolute; top: 55px; left: 15px; z-index: 2000; }
        .top-right-logo { width: 70px; position: absolute; top: 50px; right: 10px; z-index: 2000; }

       /* --- STICKY NAVIGATION (STANDARDIZED) --- */
        nav { 
            position: sticky; 
            top: 40px; 
            height: 60px;
            z-index: 3000; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            width: 100%;
            display: flex; align-items: center;
        }
        .nav-container {
            position: relative; flex: 1; display: flex; 
            justify-content: center;
            overflow-x: auto; scrollbar-width: none;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-links { display: flex; list-style: none; gap: 5px; }
        .nav-links a {
            position: relative; z-index: 2;
            text-decoration: none; color: #0038A8; 
            font-family: 'Barabara', sans-serif; font-size: 13px;
            padding: 10px 16px; white-space: nowrap; transition: 0.3s;
        }

        .nav-slider {
            position: absolute; background: #FFD300;
            box-shadow: 2px 2px 0px #CE1126; border-radius: 5px;
            z-index: 1; height: 35px; top: 50%; transform: translateY(-50%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Mobile Adjustments (Uniform across all pages) */
        @media (max-width: 480px) {
            header { height: 110px; }
            .top-left-logo { width: 45px; top: 50px; }
            .top-right-logo { width: 60px; top: 45px; }
            .nav-logo { height: 45px; }
            nav { height: 50px; }
            .nav-links a { font-size: 10px; padding: 10px 6px; }
            .nav-slider { height: 30px; }
        }

        /* --- CONTACT CONTENT --- */
        .contact-hero { 
            text-align: center; 
            padding: 60px 20px; 
            max-width: 1000px; 
            animation: slideUp 0.8s ease forwards;
        }

        .contact-title { 
            font-family: 'Barabara', sans-serif;
            font-size: clamp(34px, 8vw, 60px); 
            color: #0038A8; 
            line-height: 1; 
            margin-bottom: 40px; 
            text-transform: uppercase;
        }
        .contact-title span { color: #CE1126; }

        .info-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            width: 100%; 
            margin-bottom: 60px; 
        }

        .info-card {
            background: #fff;
            padding: 40px 30px; 
            border-radius: 12px; 
            border-bottom: 5px solid #FFD300;
            transition: 0.3s; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .info-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .info-card h3 { 
            font-family: 'Barabara';
            font-size: 14px; 
            text-transform: uppercase; 
            color: #CE1126; 
            margin-bottom: 15px; 
            letter-spacing: 2px; 
        }
        .info-card p, .info-card a { 
            font-size: 18px; 
            font-weight: 600; 
            color: #0038A8; 
            text-decoration: none; 
            word-break: break-word; 
        }

        /* --- MAP SECTION --- */
        .map-section {
            width: 100%;
            padding: 0 20px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .map-wrapper { 
            width: 100%; 
            max-width: 900px; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 8px solid white; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            position: relative; 
            height: 450px; 
        }
        iframe { width: 100%; height: 100%; border: none; }

        .map-btn {
            position: absolute; 
            bottom: 25px; 
            right: 25px; 
            background: #0038A8; 
            color: white; 
            padding: 15px 30px; 
            border-radius: 4px; 
            font-family: 'Barabara';
            text-decoration: none; 
            font-size: 14px; 
            box-shadow: 4px 4px 0px #FFD300; 
            transition: 0.3s;
        }
        .map-btn:hover { background: #CE1126; transform: scale(1.05); }

        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

        /* MOBILE TWEAKS */
        @media (max-width: 480px) {
            header { height: 110px; }
            .ariya-badge { width: 45px; top: 50px; }
            .top-right-logo { width: 60px; top: 45px; }
            .nav-logo { height: 45px; }
            nav { height: 50px; }
            .nav-links a { font-size: 10px; padding: 10px 6px; }
        }
    </style>
</head>
<body>

    <div class="top-accent"></div>
    <img src="ariya.jpg" alt="Ariya Logo" class="ariya-badge">
    <img src="niyogyuganlogo.png" alt="Niyogyugan Logo" class="top-right-logo">

    <header>
        <a href="index.html">
            <img src="AlabatLogo.png" alt="Alabat Tourism" class="nav-logo">
        </a>
    </header>

    <nav>
        <div class="nav-container">
            <div class="nav-slider" id="navShade"></div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="destinations.html">DESTINATIONS</a></li>
                <li><a href="products.html">PRODUCTS</a></li>
                <li><a href="contact.html" id="activeLink">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <div class="contact-hero">
        <h1 class="contact-title">SAY HELLO TO <span>ALABAT</span></h1>
        
        <div class="info-grid">
            <div class="info-card">
                <h3>Location</h3>
                <p>Tourist Information Center<br>Poblacion, Alabat, Quezon</p>
            </div>
            <div class="info-card">
                <h3>Call Us</h3>
                <a href="tel:09478263117">0947 826 3117</a>
            </div>
            <div class="info-card">
                <h3>Email Us</h3>
                <a href="mailto:alabattourism@gmail.com">alabattourism@gmail.com</a>
            </div>
        </div>
    </div>

    <div class="map-section">
        <div class="map-wrapper">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3869.563212891341!2d122.0125!3d14.1!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33b0000000000000%3A0x0!2zMTTCsDA2JzAwLjAiTiAxMjLCsDAwJzQ1LjAiRQ!5e0!3m2!1sen!2sph!4v1700000000000"></iframe>
            <a href="https://maps.google.com" target="_blank" class="map-btn">GET DIRECTIONS</a>
        </div>
    </div>

    <script>
        const shade = document.getElementById('navShade');
        const activeLink = document.getElementById('activeLink');

        function moveShade(el) {
            if(el) {
                shade.style.width = el.offsetWidth + 'px';
                shade.style.left = el.offsetLeft + 'px';
            }
        }

        window.addEventListener('load', () => moveShade(activeLink));
        window.addEventListener('resize', () => moveShade(activeLink));
    </script>
</body>
</html>
