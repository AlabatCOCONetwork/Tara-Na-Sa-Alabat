<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Alabat Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* --- LOCAL BARABARA FONT --- */
        @font-face {
            font-family: 'Barabara';
            src: url('BARABARA-final.otf') format('opentype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #f8f9fa;
            color: #222;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- PHILIPPINE FLAG TOP BAR --- */
        .top-accent {
            height: 6px;
            background: linear-gradient(90deg, #0038A8 25%, #CE1126 25%, #CE1126 50%, #FFD300 50%, #FFD300 75%, #00AF66 75%);
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 4000;
        }

        /* --- HEADER & BRANDING --- */
        header {
            padding: 50px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.98)), url('farmersbg.png');
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #eee;
        }
        .nav-logo { height: 65px; width: auto; }
        .ariya-badge { width: 55px; position: absolute; top: 20px; left: 15px; z-index: 2000; }

        /* --- STICKY NAVIGATION (FIXED) --- */
        nav { 
            position: sticky; top: 6px; z-index: 3000; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            padding: 10px 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-container {
            position: relative; flex: 1; display: flex; 
            overflow: hidden;
            justify-content: center;
        }
        
        .nav-links { display: flex; list-style: none; gap: 5px; width: 100%; justify-content: center; }
        .nav-links a {
            position: relative; z-index: 2;
            text-decoration: none; color: #0038A8; 
            font-family: 'Barabara', sans-serif; font-size: 13px;
            padding: 10px 16px; white-space: nowrap; transition: 0.3s;
        }

        .nav-slider {
            position: absolute; background: #FFD300;
            box-shadow: 2px 2px 0px #CE1126; border-radius: 5px;
            z-index: 1; height: 35px; top: 50%; transform: translateY(-50%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* MOBILE NAV TWEAKS */
        @media (max-width: 480px) {
            .nav-links { gap: 2px; justify-content: space-evenly; }
            .nav-links a { font-size: 10px; padding: 8px 4px; letter-spacing: -0.5px; }
            .nav-slider { height: 30px; }
        }

        /* --- CART ICON --- */
        .cart-trigger {
            background: #0038A8; width: 44px; height: 44px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            position: relative; margin-left: 10px; cursor: pointer;
            box-shadow: 2px 2px 0px #CE1126; flex-shrink: 0;
        }
        .cart-count {
            position: absolute; top: -8px; right: -8px; background: #CE1126;
            color: white; font-size: 10px; font-weight: 900; width: 22px;
            height: 22px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; border: 2px solid #fff;
        }

        /* --- MAIN LAYOUT --- */
        .main-content { padding: 30px 20px; max-width: 1200px; margin: 0 auto; }
        
        .made-with-love { 
            font-family: 'Barabara', sans-serif; 
            color: #0038A8; font-size: 36px; line-height: 1.1; 
            text-align: center; margin-bottom: 30px;
        }
        .made-with-love span { color: #CE1126; }

        /* Video Section */
        .video-side { margin-bottom: 50px; position: relative; }
        .video-frame { 
            border-radius: 15px; overflow: hidden; aspect-ratio: 16/9;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 4px solid #fff;
            background: #000; position: relative;
        }
        .video-frame iframe { width: 100%; height: 100%; }

        .video-label { 
            position: absolute; bottom: 80px; left: 0; z-index: 10;
            font-family: 'Barabara'; font-size: 12px; color: #fff;
            background: #0038A8; padding: 8px 20px; 
            box-shadow: 4px 0 0 #FFD300;
            transition: opacity 0.5s ease;
        }

        .video-controls { display: flex; justify-content: flex-end; gap: 10px; margin-top: -25px; position: relative; z-index: 20; padding-right: 20px; }
        
        .video-nav-btn {
            background: #CE1126; border: none; width: 50px; height: 50px;
            cursor: pointer; font-size: 18px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 0px #FFD300; color: white;
            border-radius: 4px;
        }
        .video-nav-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #FFD300; }

        /* --- PRODUCT GRID --- */
        .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .product-card {
            background: #fff; border-radius: 12px; padding: 18px;
            display: flex; gap: 18px; align-items: center;
            border: 1px solid #eee; transition: 0.3s; cursor: pointer;
        }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-color: #0038A8; }
        .product-card img { width: 90px; height: 90px; border-radius: 10px; object-fit: cover; background: #f9f9f9; }
        .product-info { flex: 1; }
        .product-name { font-family: 'Barabara', sans-serif; color: #0038A8; font-size: 15px; text-transform: uppercase; }
        .product-description { font-size: 12px; color: #666; margin: 4px 0; line-height: 1.3; }
        .list-price { font-weight: 800; color: #CE1126; font-size: 16px; font-family: 'Barabara'; }

        .add-cart-btn {
            background: #FFD300; color: #0038A8; width: 42px; height: 42px;
            border-radius: 8px; border: none; font-weight: 900; font-size: 22px;
            cursor: pointer; box-shadow: 3px 3px 0px #CE1126; transition: 0.1s;
        }
        .add-cart-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #CE1126; }

        /* --- CART SIDEBAR --- */
        .cart-sidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 380px;
            height: 100vh; background: #fff; z-index: 5000; padding: 0;
            box-shadow: -15px 0 40px rgba(0,0,0,0.15); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        .cart-sidebar.active { right: 0; }
        .cart-header {
            padding: 30px 20px; background: #0038A8; color: white;
            font-family: 'Barabara'; font-size: 22px; display: flex; justify-content: space-between;
            position: relative;
        }
        .cart-header::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #CE1126 33%, #FFD300 33%, #FFD300 66%, #00AF66 66%);
        }
        .cart-body { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-footer { border-top: 1px solid #eee; padding: 25px 20px; background: #f9f9f9; }

        /* Desktop Adjustments */
        @media (min-width: 992px) {
            .main-content { display: grid; grid-template-columns: 1.3fr 1fr; gap: 50px; padding: 60px 20px; }
            .video-side { position: sticky; top: 100px; }
            .made-with-love { text-align: left; font-size: 52px; margin-bottom: 40px; }
        }

        /* --- ZOOM OVERLAY --- */
        .zoom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); display: none; z-index: 6000;
            padding: 20px; justify-content: center; align-items: center;
        }
        .zoom-overlay.active { display: flex; }
        .zoom-content { max-width: 480px; width: 100%; text-align: center; }
        .zoom-content img { width: 100%; border-radius: 12px; border: 4px solid #0038A8; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .zoom-content h2 { font-family: 'Barabara', sans-serif; color: #0038A8; margin-top: 20px; font-size: 24px; }
        .close-zoom-btn { 
            margin-top: 25px; background: #CE1126; color: white; border: none;
            padding: 12px 40px; border-radius: 4px; font-family: 'Barabara'; cursor: pointer;
            box-shadow: 3px 3px 0px #FFD300;
        }
    </style>
</head>
<body>

    <div class="top-accent"></div>
    <img src="ariya.jpg" alt="Ariya" class="ariya-badge">

    <header>
        <a href="index.html"><img src="AlabatLogo.png" alt="Alabat Logo" class="nav-logo"></a>
    </header>

    <nav>
        <div class="nav-container">
            <div class="nav-slider" id="navShade"></div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="destinations.html">DESTINATIONS</a></li>
                <li><a href="products.html" id="activeLink">PRODUCTS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>
        <div class="cart-trigger" onclick="toggleCart()">
            <span style="font-size: 22px;">🛒</span>
            <div class="cart-count" id="cart-badge">0</div>
        </div>
    </nav>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            YOUR BASKET <span onclick="toggleCart()" style="cursor:pointer; opacity:0.8;">✕</span>
        </div>
        <div class="cart-body" id="cart-items-list"></div>
        <div class="cart-footer">
            <div style="display:flex; justify-content:space-between; font-weight:800; margin-bottom:20px; color:#0038A8;">
                <span style="font-family:'Barabara'">TOTAL</span><span id="cart-total-amount" style="font-size:20px;">₱0.00</span>
            </div>
            <button onclick="location.href='checkout.html'" style="width:100%; background:#CE1126; color:white; padding:18px; border-radius:6px; border:none; font-family:'Barabara'; font-size:18px; cursor:pointer; box-shadow:4px 4px 0px #FFD300;">PROCEED TO CHECKOUT</button>
        </div>
    </div>

    <div class="main-content">
        <div class="video-side">
            <h1 class="made-with-love">MADE WITH <span>LOVE</span><br>JUST FOR YOU!</h1>
            <div class="video-frame">
                <div class="video-label" id="videoTitle">OUR PROCESS</div>
                <iframe id="processVideo" 
                        src="https://www.youtube.com/embed/TdZzwAT-FFw?autoplay=0&loop=1&playlist=TdZzwAT-FFw" 
                        allow="autoplay; encrypted-media" allowfullscreen>
                </iframe>
            </div>
            <div class="video-controls">
                <button class="video-nav-btn" onclick="prevVideo()">&#10094;</button>
                <button class="video-nav-btn" onclick="nextVideo()">&#10095;</button>
            </div>
        </div>

        <div class="slider-section">
            <div class="product-list" id="products-list"></div>
        </div>
    </div>

    <div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom()">
        <div class="zoom-content" onclick="event.stopPropagation()">
            <img id="zoomImg" src="">
            <h2 id="zoomTitle"></h2>
            <p id="zoomBody" style="margin: 15px 0; color: #555; line-height: 1.5;"></p>
            <h3 id="zoomPrice" style="color:#CE1126; font-size:28px; font-family:'Barabara';"></h3>
            <button class="close-zoom-btn" onclick="closeZoom()">CLOSE WINDOW</button>
        </div>
    </div>

    <script>
        // --- NAVIGATION SLIDER ---
        const shade = document.getElementById('navShade');
        const activeLink = document.getElementById('activeLink');
        function moveShade(el) {
            shade.style.width = el.offsetWidth + 'px';
            shade.style.left = el.offsetLeft + 'px';
        }
        window.addEventListener('load', () => moveShade(activeLink));
        window.addEventListener('resize', () => moveShade(activeLink));

        // --- VIDEO LABEL FADE ---
        const vTitle = document.getElementById('videoTitle');
        function fadeLabel() {
            vTitle.style.opacity = '1';
            setTimeout(() => {
                vTitle.style.opacity = '0';
            }, 1000);
        }
        window.addEventListener('load', fadeLabel);

        // --- VIDEO PLAYLIST ---
        const videoFrame = document.getElementById('processVideo');
        const myVideos = [
            { id: "TdZzwAT-FFw", title: "HANDMADE QUALITY" },
            { id: "Na-BqhLr-PA", title: "LOCAL HARVEST" },
            { id: "qLVsOpQ2sUM", title: "ISLAND FLAVORS" },
            { id: "y2l_bqQWGEM", title: "ALABAT TRADITION" }
        ];
        let vIdx = 0;
        function updateVideo() { 
            const vid = myVideos[vIdx];
            videoFrame.src = `https://www.youtube.com/embed/${vid.id}?autoplay=1&loop=1&playlist=${vid.id}`; 
            vTitle.innerText = vid.title;
            fadeLabel();
        }
        function nextVideo() { vIdx = (vIdx + 1) % myVideos.length; updateVideo(); }
        function prevVideo() { vIdx = (vIdx - 1 + myVideos.length) % myVideos.length; updateVideo(); }

        // --- PRODUCT INVENTORY ---
        const inventory = [
            { name: "BALAT LITSON", price: "₱100.00", img: "balatlitchon.jpg", desc: "Alabat's signature crispy bread snack! A local favorite." },
            { name: "BANANA CHIPS", price: "₱120.00", img: "bananachips.jpg", desc: "Crispy Saba slices glazed with natural coco honey." },
            { name: "PURE HONEY", price: "₱350.00", img: "honey.jpg", desc: "Raw, organic honey harvested from local stingless bees." },
            { name: "70% DARK CHOCOLATE", price: "₱220.00", img: "darkchocolate.jpg", desc: "Premium Alabat cocoa blended with healthy coco sugar." },
            { name: "PEANUT BUTTER", price: "₱160.00", img: "peanutbutter.jpg", desc: "Creamy, homemade, and naturally sweet peanut spread." },
            { name: "ATSARA PAPAYA", price: "₱140.00", img: "atsara.jpg", desc: "Traditional Filipino pickled papaya with a tropical twist." },
            { name: "ATSARA UBOD", price: "₱160.00", img: "atsarau.jpg", desc: "A rare island delicacy made from fresh heart of palm." },
            { name: "COCO SUGAR", price: "₱180.00", img: "coco-sugar.jpg", desc: "Low-glycemic, organic sweetener from Alabat's coconuts." },
            { name: "CACAO BRITTLE", price: "₱150.00", img: "kakaobrittle.jpg", desc: "Thin, crunchy, and intensely flavored cacao treat." },
            { name: "CACAO TABLEA", price: "₱120.00", img: "kakaotablea.jpg", desc: "Traditional chocolate tablets for authentic Sikwate." },
            { name: "LIPOTE WINE", price: "₱280.00", img: "lipote.jpg", desc: "Exotic, antioxidant-rich wine made from wild Lipote berries." },
            { name: "VIRGIN COCONUT OIL", price: "₱250.00", img: "vco.jpg", desc: "Cold-pressed, high-quality oil for health and beauty." }
        ];

        function renderProducts() {
            const listDiv = document.getElementById('products-list');
            listDiv.innerHTML = inventory.map((prod, index) => {
                return `
                    <div class="product-card" onclick="openZoom(${index})">
                        <img src="${prod.img}">
                        <div class="product-info">
                            <h3 class="product-name">${prod.name}</h3>
                            <p class="product-description">${prod.desc}</p>
                            <span class="list-price">${prod.price}</span>
                        </div>
                        <button class="add-cart-btn" onclick="event.stopPropagation(); addToCart('${prod.name}', '${prod.img}', '${prod.price}')">+</button>
                    </div>`;
            }).join('');
        }

        // --- MODAL & CART LOGIC ---
        function openZoom(idx) {
            const p = inventory[idx];
            document.getElementById('zoomImg').src = p.img;
            document.getElementById('zoomTitle').innerText = p.name;
            document.getElementById('zoomBody').innerText = p.desc;
            document.getElementById('zoomPrice').innerText = p.price;
            document.getElementById('zoomOverlay').classList.add('active');
        }
        function closeZoom() { document.getElementById('zoomOverlay').classList.remove('active'); }

        let cart = JSON.parse(localStorage.getItem('alabat_cart')) || [];
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
        
        function addToCart(name, img, price) {
            const item = cart.find(i => i.name === name);
            if (item) item.quantity++; else cart.push({ name, img, price, quantity: 1 });
            updateCart();
            if(!document.getElementById('cartSidebar').classList.contains('active')) toggleCart();
        }

        function updateCart() {
            localStorage.setItem('alabat_cart', JSON.stringify(cart));
            document.getElementById('cart-badge').innerText = cart.reduce((s, i) => s + i.quantity, 0);
            const list = document.getElementById('cart-items-list');
            let total = 0;
            list.innerHTML = cart.map(i => {
                total += parseFloat(i.price.replace(/[₱,]/g, '')) * i.quantity;
                return `
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px; border-bottom:1px solid #f5f5f5; padding-bottom:12px;">
                    <img src="${i.img}" style="width:55px; height:55px; border-radius:6px; object-fit:cover;">
                    <div style="flex:1"><h4 style="font-size:14px; color:#0038A8;">${i.name}</h4><p style="font-size:12px; color:#CE1126; font-weight:800;">${i.price} x ${i.quantity}</p></div>
                </div>`;
            }).join('');
            document.getElementById('cart-total-amount').innerText = `₱${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        renderProducts();
        updateCart();
    </script>
</body>
</html>
