<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Alabat Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* --- LOCAL BARABARA FONT --- */
        @font-face {
            font-family: 'Barabara';
            src: url('BARABARA-final.otf') format('opentype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #f8f9fa;
            color: #222;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- FESTIVE TOP ACCENT --- */
        .top-accent {
            height: 6px;
            background: linear-gradient(90deg, #0038A8 25%, #CE1126 25%, #CE1126 50%, #FFD300 50%, #FFD300 75%, #00AF66 75%);
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 4000;
        }

        /* --- HEADER & FARMERS BG INTEGRATION --- */
        header {
            padding: 50px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.95)), url('farmersbg.png');
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #eee;
        }
        .nav-logo { height: 60px; width: auto; }
        .ariya-badge { width: 55px; position: absolute; top: 20px; left: 15px; z-index: 2000; }

        /* --- STICKY MOBILE NAV --- */
        nav { 
            position: sticky; top: 6px; z-index: 3000; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-container {
            position: relative; flex: 1; display: flex; 
            overflow-x: auto; scrollbar-width: none;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-links { display: flex; list-style: none; gap: 5px; }
        .nav-links a {
            position: relative; z-index: 2;
            text-decoration: none; color: #0038A8; 
            font-family: 'Barabara', sans-serif; font-size: 13px;
            padding: 10px 16px; white-space: nowrap; transition: 0.3s;
        }

        .nav-slider {
            position: absolute; background: #FFD300;
            box-shadow: 2px 2px 0px #CE1126; border-radius: 5px;
            z-index: 1; height: 35px; top: 50%; transform: translateY(-50%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- CART TRIGGER --- */
        .cart-trigger {
            background: #0038A8; width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative; margin-left: 10px; cursor: pointer;
        }
        .cart-count {
            position: absolute; top: -5px; right: -5px; background: #CE1126;
            color: white; font-size: 10px; font-weight: 900; width: 20px;
            height: 20px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; border: 2px solid #fff;
        }

        /* --- MAIN CONTENT (Mobile First) --- */
        .main-content { padding: 20px; max-width: 1100px; margin: 0 auto; }
        
        .made-with-love { 
            font-family: 'Barabara', sans-serif; 
            color: #0038A8; font-size: 32px; line-height: 1; 
            text-align: center; margin-bottom: 25px;
        }

        /* Video Section */
        .video-side { margin-bottom: 40px; }
        .video-frame { 
            border-radius: 20px; overflow: hidden; aspect-ratio: 16/9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid #fff;
        }
        .video-frame iframe { width: 100%; height: 100%; }
        .video-controls { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .video-nav-btn {
            background: #fff; border: 2px solid #eee; width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; font-size: 18px; transition: 0.2s;
        }

        /* --- PRODUCT CARDS (Mobile First) --- */
        .product-list { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .product-card {
            background: #fff; border-radius: 15px; padding: 15px;
            display: flex; gap: 15px; align-items: center;
            border: 1px solid #eee; transition: 0.3s;
        }
        .product-card img { width: 85px; height: 85px; border-radius: 12px; object-fit: cover; }
        .product-info { flex: 1; }
        .product-name { font-family: 'Barabara', sans-serif; color: #0038A8; font-size: 16px; }
        .product-description { font-size: 12px; color: #666; margin: 3px 0; }
        .list-price { font-weight: 900; color: #CE1126; font-size: 15px; }

        .add-cart-btn {
            background: #FFD300; color: #0038A8; width: 40px; height: 40px;
            border-radius: 10px; border: none; font-weight: 900; font-size: 20px;
            cursor: pointer; box-shadow: 2px 2px 0px #CE1126;
        }

        /* --- CART SIDEBAR --- */
        .cart-sidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px;
            height: 100vh; background: #fff; z-index: 5000; padding: 30px 20px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: 0.4s;
            display: flex; flex-direction: column;
        }
        .cart-sidebar.active { right: 0; }

        /* Desktop Layout */
        @media (min-width: 992px) {
            .main-content { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; padding: 40px; }
            .video-side { position: sticky; top: 100px; }
            .made-with-love { text-align: left; font-size: 48px; }
        }

        /* --- ZOOM MODAL --- */
        .zoom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); display: none; z-index: 6000;
            padding: 20px; justify-content: center; align-items: center;
        }
        .zoom-overlay.active { display: flex; }
        .zoom-content { 
            max-width: 500px; width: 100%; text-align: center;
        }
        .zoom-content img { width: 100%; border-radius: 15px; border: 5px solid #FFD300; }
        .zoom-content h2 { font-family: 'Barabara', sans-serif; color: #0038A8; margin-top: 15px; }
        .close-zoom-btn { 
            margin-top: 20px; background: #CE1126; color: white; border: none;
            padding: 10px 30px; border-radius: 50px; font-family: 'Barabara'; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-accent"></div>
    <img src="ariya.jpg" alt="Ariya" class="ariya-badge">

    <header>
        <a href="index.html"><img src="AlabatLogo.png" alt="Alabat Logo" class="nav-logo"></a>
    </header>

    <nav>
        <div class="nav-container">
            <div class="nav-slider" id="navShade"></div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="destinations.html">DESTINATIONS</a></li>
                <li><a href="products.html" id="activeLink">PRODUCTS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>
        <div class="cart-trigger" onclick="toggleCart()">
            <span style="font-size: 20px;">🛒</span>
            <div class="cart-count" id="cart-badge">0</div>
        </div>
    </nav>

    <div class="cart-sidebar" id="cartSidebar">
        <div style="font-family:'Barabara'; font-size:24px; color:#0038A8; margin-bottom:20px; display:flex; justify-content:space-between;">
            YOUR BASKET <span onclick="toggleCart()" style="cursor:pointer; color:#CE1126;">✕</span>
        </div>
        <div id="cart-items-list" style="flex:1; overflow-y:auto;"></div>
        <div style="border-top:2px solid #f1f1f1; padding-top:20px;">
            <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:15px;">
                <span>Total</span><span id="cart-total-amount">₱0.00</span>
            </div>
            <button onclick="location.href='checkout.html'" style="width:100%; background:#0038A8; color:white; padding:15px; border-radius:10px; border:none; font-family:'Barabara'; font-size:18px; cursor:pointer;">CHECKOUT</button>
        </div>
    </div>

    <div class="main-content">
        <div class="video-side">
            <h1 class="made-with-love">MADE WITH LOVE<br>JUST FOR YOU!</h1>
            <div class="video-frame">
                <iframe id="processVideo" 
                        src="https://www.youtube.com/embed/TdZzwAT-FFw?autoplay=0&loop=1&playlist=TdZzwAT-FFw" 
                        allow="autoplay; encrypted-media" allowfullscreen>
                </iframe>
            </div>
            <div class="video-controls">
                <button class="video-nav-btn" onclick="prevVideo()">&#10094;</button>
                <button class="video-nav-btn" onclick="nextVideo()">&#10095;</button>
            </div>
        </div>

        <div class="slider-section">
            <div class="product-list" id="products-list"></div>
        </div>
    </div>

    <div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom()">
        <div class="zoom-content" onclick="event.stopPropagation()">
            <img id="zoomImg" src="">
            <h2 id="zoomTitle"></h2>
            <p id="zoomBody" style="margin: 10px 0; color: #555;"></p>
            <h3 id="zoomPrice" style="color:#CE1126; font-size:24px; font-weight:900;"></h3>
            <button class="close-zoom-btn" onclick="closeZoom()">CLOSE</button>
        </div>
    </div>

    <script>
        // --- NAVIGATION SLIDER ---
        const shade = document.getElementById('navShade');
        const activeLink = document.getElementById('activeLink');
        function moveShade(el) {
            shade.style.width = el.offsetWidth + 'px';
            shade.style.left = el.offsetLeft + 'px';
        }
        window.addEventListener('load', () => moveShade(activeLink));
        window.addEventListener('resize', () => moveShade(activeLink));

        // --- VIDEO PLAYLIST ---
        const videoFrame = document.getElementById('processVideo');
        const myVideos = ["TdZzwAT-FFw", "Na-BqhLr-PA", "qLVsOpQ2sUM", "y2l_bqQWGEM"];
        let vIdx = 0;
        function updateVideo() { 
            const vidId = myVideos[vIdx];
            videoFrame.src = `https://www.youtube.com/embed/${vidId}?autoplay=1&loop=1&playlist=${vidId}`; 
        }
        function nextVideo() { vIdx = (vIdx + 1) % myVideos.length; updateVideo(); }
        function prevVideo() { vIdx = (vIdx - 1 + myVideos.length) % myVideos.length; updateVideo(); }

        // --- PRODUCT INVENTORY ---
        const inventory = [
            { name: "BALAT LITSON", price: "₱100.00", content: "Organic", img: "balatlitchon.jpg", desc: "Alabat's signature crispy bread snack!", available: true },
            { name: "BANANA CHIPS", price: "₱120.00", content: "Organic", img: "bananachips.jpg", desc: "Crispy Saba slices with coco honey.", available: true },
            { name: "PURE HONEY", price: "₱350.00", content: "Tres Princesitas", img: "honey.jpg", desc: "Raw honey from local stingless bees.", available: true },
            { name: "70% DARK CHOCOLATE", price: "₱220.00", content: "Organic", img: "darkchocolate.jpg", desc: "Premium cocoa with coco sugar.", available: true },
            { name: "HOMEMADE PEANUT BUTTER", price: "₱160.00", content: "Organic", img: "peanutbutter.jpg", desc: "Creamy and naturally sweet.", available: true },
            { name: "ATSARA PAPAYA", price: "₱140.00", content: "Organic", img: "atsara.jpg", desc: "Classic Filipino pickled papaya.", available: true },
            { name: "ATSARA UBOD", price: "₱160.00", content: "Organic", img: "atsarau.jpg", desc: "Island delicacy made from heart of palm.", available: true },
            { name: "PURE HONEY (ROSEMAY)", price: "₱380.00", content: "Rosemay", img: "honeyrose.jpg", desc: "Specialty infused honey.", available: true },
            { name: "COCO SUGAR", price: "₱180.00", content: "Organic", img: "coco-sugar.jpg", desc: "Healthy alternative coco sugar.", available: true },
            { name: "CACAO BRITTLE", price: "₱150.00", content: "Organic", img: "kakaobrittle.jpg", desc: "Thin and intensely chocolatey.", available: true },
            { name: "CACAO TABLEA", price: "₱120.00", content: "Organic", img: "kakaotablea.jpg", desc: "Perfect for authentic Sikwate.", available: true },
            { name: "LIPOTE WINE", price: "₱280.00", content: "Organic", img: "lipote.jpg", desc: "Antioxidant-rich berry wine.", available: true },
            { name: "VIRGIN COCONUT OIL", price: "₱250.00", content: "Organic", img: "vco.jpg", desc: "Premium oil for health and wellness.", available: true }
        ];

        function renderProducts() {
            const listDiv = document.getElementById('products-list');
            listDiv.innerHTML = inventory.map((prod, index) => {
                const isAvail = prod.available !== false;
                return `
                    <div class="product-card" onclick="openZoom(${index})">
                        <img src="${prod.img}" style="${isAvail ? '' : 'filter:grayscale(1); opacity:0.5;'}">
                        <div class="product-info">
                            <h3 class="product-name">${prod.name}</h3>
                            <p class="product-description">${prod.desc}</p>
                            <span class="list-price">${prod.price}</span>
                        </div>
                        <button class="add-cart-btn" onclick="event.stopPropagation(); addToCart('${prod.name}', '${prod.img}', '${prod.price}')">+</button>
                    </div>`;
            }).join('');
        }

        // --- MODAL & CART LOGIC ---
        function openZoom(idx) {
            const p = inventory[idx];
            document.getElementById('zoomImg').src = p.img;
            document.getElementById('zoomTitle').innerText = p.name;
            document.getElementById('zoomBody').innerText = p.desc;
            document.getElementById('zoomPrice').innerText = p.price;
            document.getElementById('zoomOverlay').classList.add('active');
        }
        function closeZoom() { document.getElementById('zoomOverlay').classList.remove('active'); }

        let cart = JSON.parse(localStorage.getItem('alabat_cart')) || [];
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
        
        function addToCart(name, img, price) {
            const item = cart.find(i => i.name === name);
            if (item) item.quantity++; else cart.push({ name, img, price, quantity: 1 });
            updateCart();
            if(!document.getElementById('cartSidebar').classList.contains('active')) toggleCart();
        }

        function updateCart() {
            localStorage.setItem('alabat_cart', JSON.stringify(cart));
            document.getElementById('cart-badge').innerText = cart.reduce((s, i) => s + i.quantity, 0);
            const list = document.getElementById('cart-items-list');
            let total = 0;
            list.innerHTML = cart.map(i => {
                total += parseFloat(i.price.replace(/[₱,]/g, '')) * i.quantity;
                return `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; border-bottom:1px solid #f1f1f1; padding-bottom:10px;">
                    <img src="${i.img}" style="width:50px; height:50px; border-radius:8px; object-fit:cover;">
                    <div style="flex:1"><h4 style="font-size:14px;">${i.name}</h4><p style="font-size:12px;">${i.price} x ${i.quantity}</p></div>
                </div>`;
            }).join('');
            document.getElementById('cart-total-amount').innerText = `₱${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        renderProducts();
        updateCart();
    </script>
</body>
</html>
