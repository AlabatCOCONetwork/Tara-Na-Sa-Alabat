        @import +-+url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        @font-face {
            font-family: 'Barabara';

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #f8f9fa;
            color: #222;

      /* --- BACKGROUND PHOTO EFFECT --- */
body::before {
    content: "";
    position: fixed;
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100vh; 
    z-index: -1;
    opacity: 0.15;
    
    /* This forces the center */
    display: flex;
    align-items: center;
    justify-content: center;

    /* We use mask/background logic that is rock-solid */
    background-image: url('ariya.jpg');
    background-repeat: no-repeat;
    background-position: center center;
    
    /* 'contain' ensures it fits the screen, 
       '80%' ensures it doesn't touch the edges */
    background-size: contain;
    
    /* Fix for mobile jumping/moving */
    pointer-events: none;
    will-change: transform;
}

 /* --- BRANDED PATTERN TOP BAR --- */

        .top-left-logo { width: 55px; position: absolute; top: 55px; left: 15px; z-index: 2000; }
        .top-right-logo { width: 70px; position: absolute; top: 50px; right: 10px; z-index: 2000; }
/* --- HEADER & BRANDING (STANDARDIZED) --- */
        header {
            height: 125px;
            padding-top: 40px; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.98)), url('background.jpg');
            background-size: cover;
            background-position: center;
            width: 100%;
            position: relative;
            border-bottom: 1px solid #eee;
        }
        .nav-logo { height: 60px; width: auto; }
        .ariya-badge { width: 55px; position: absolute; top: 55px; left: 15px; z-index: 2000; }
        .top-right-logo { width: 70px; position: absolute; top: 50px; right: 10px; z-index: 2000; }

        /* --- STICKY NAVIGATION (STANDARDIZED) --- */
        nav { 
            position: sticky; 
            top: 40px; 
            height: 60px;
            z-index: 3000; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            width: 100%;
            display: flex; align-items: center;
        }
        .nav-container {
            position: relative; flex: 1; display: flex; 
            justify-content: center;
            overflow-x: auto; scrollbar-width: none;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-links { display: flex; list-style: none; gap: 5px; }
        .nav-links a {
            position: relative; z-index: 2;
            text-decoration: none; color: #0038A8; 
            font-family: 'Barabara', sans-serif; font-size: 13px;
            padding: 10px 16px; white-space: nowrap; transition: 0.3s;
        }

        .nav-slider {
            position: absolute; background: #FFD300;
            box-shadow: 2px 2px 0px #CE1126; border-radius: 5px;
            z-index: 1; height: 35px; top: 50%; transform: translateY(-50%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Mobile Adjustments (Uniform across all pages) */
        @media (max-width: 480px) {
            header { height: 110px; }
            .top-left-logo { width: 45px; top: 50px; }
            .top-right-logo { width: 60px; top: 45px; }
            .nav-logo { height: 45px; }
            nav { height: 50px; }
            .nav-links a { font-size: 10px; padding: 10px 6px; }
            .nav-slider { height: 30px; }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .cart-trigger {
            background: #0038A8; width: 44px; height: 44px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
            box-shadow: 2px 2px 0px #CE1126; flex-shrink: 0;
        }
        .cart-count {
            position: absolute; top: -8px; right: -8px; background: #CE1126;
            color: white; font-size: 10px; font-weight: 900; width: 22px;
            height: 22px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; border: 2px solid #fff;
        }

        .main-content { 
            padding: 40px 20px; 
            max-width: 1200px; 
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* --- PRODUCT ZOOM OUT EFFECT --- */
        .product-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 20px; 
            padding-bottom: 60px;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.9); border-radius: 15px; padding: 15px;
            display: flex; gap: 15px; align-items: center;
            border: 1px solid #eee; transition: transform 0.4s ease, border-color 0.3s; 
            cursor: pointer;
        }
        .product-card:hover { 
            border-color: #FFD300; 
            transform: scale(0.95); /* Zoom out effect */
        }

        .card-left { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
        .product-card img { width: 85px; height: 85px; border-radius: 10px; object-fit: cover; }
        .list-price { font-weight: 800; color: #CE1126; font-size: 14px; font-family: 'Barabara'; }

        .card-mid { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .product-name { font-family: 'Barabara', sans-serif; color: #0038A8; font-size: 15px; text-transform: uppercase; margin-bottom: 2px; }
        .product-maker { font-size: 11px; font-weight: 700; color: #CE1126; margin-bottom: 5px; font-style: italic; }
        .product-description { font-size: 12px; color: #444; line-height: 1.4; }

        .add-cart-btn {
            background: #FFD300; color: #0038A8; width: 40px; height: 40px;
            border-radius: 8px; border: none; font-weight: 900; font-size: 20px;
            cursor: pointer; box-shadow: 2px 2px 0px #CE1126; flex-shrink: 0;
        }

        /* Video Section */
        .video-side { width: 100%; max-width: 700px; margin: 0 auto; }
        .video-frame { 
            border-radius: 20px; overflow: hidden; aspect-ratio: 16/9;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); border: 8px solid #fff;
            background: #000; position: relative;
        }
        .video-frame iframe { width: 100%; height: 100%; border:none; }
        .video-label { 
            position: absolute; top: 15px; left: 15px; z-index: 10;
            font-family: 'Barabara'; font-size: 11px; color: #fff;
            background: rgba(0, 56, 168, 0.9); padding: 6px 12px; border-radius: 4px;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px;
            height: 100vh; background: #fff; z-index: 5000; transition: 0.4s;
            display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        .cart-sidebar.active { right: 0; }
        .cart-header { padding: 25px; background: #0038A8; color: white; font-family: 'Barabara'; display: flex; justify-content: space-between; }
        .cart-body { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-footer { padding: 25px; border-top: 1px solid #eee; }

        @media (min-width: 1024px) {
            .main-content { display: grid; grid-template-columns: 1fr 1.2fr; gap: 50px; padding: 60px 5%; align-items: start; }
            .video-side { position: sticky; top: 120px; }
        }
    </style>

        <div class="cart-body" id="cart-items-list"></div>
        <div class="cart-footer">

    <script>
        // --- ADMIN CONNECTION LOGIC ---
        // This looks for "alabat_products" in local storage. 
        // If empty, it uses the default items below.
        let inventory = JSON.parse(localStorage.getItem('alabat_products')) || [
            { name: "BALAT LITSON", price: "₱100.00", img: "balatlitchon.jpg", desc: "Alabat's signature crispy bread snack! A local favorite with the perfect crunch." },
            { name: "BANANA CHIPS", price: "₱120.00", img: "bananachips.jpg", desc: "Crispy Saba slices glazed with natural coco honey for a healthy, sweet treat." },
            { name: "PURE HONEY", price: "₱350.00", img: "honey.jpg", desc: "Raw, organic honey harvested from local stingless bees." },
            { name: "DARK CHOCOLATE", price: "₱220.00", img: "darkchocolate.jpg", desc: "Premium Alabat cocoa blended with healthy coco sugar." }
        ];

        function renderProducts() {
            const listDiv = document.getElementById('products-list');
            listDiv.innerHTML = inventory.map((prod, index) => `
                <div class="product-card">
                    <div class="card-left">
                        <img src="${prod.img}">
                        <span class="list-price">${prod.price}</span>
                    </div>
                    <div class="card-mid">
                        <h3 class="product-name">${prod.name}</h3>
                        <p class="product-maker">100% natural made by Ate Eva</p>
                        <p class="product-description">${prod.desc}</p>
                    </div>
                    <button class="add-cart-btn" onclick="addToCart('${prod.name}', '${prod.price}')">+</button>
                </div>
            `).join('');
        }

        let cartCount = 0;
        function addToCart(name, price) {
            cartCount++;
            document.getElementById('cart-badge').innerText = cartCount;
        }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }

        const shade = document.getElementById('navShade');
        const activeLink = document.getElementById('activeLink');
        function moveShade(el) {
            if (el) {
                shade.style.width = el.offsetWidth + 'px';
                shade.style.left = el.offsetLeft + 'px';
            }
        }

        window.addEventListener('load', () => {
            renderProducts();
            moveShade(activeLink);
        });
    </script>
