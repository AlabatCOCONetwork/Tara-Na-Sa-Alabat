<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Alabat Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        @font-face {
            font-family: 'Barabara';
            src: url('BARABARA-final.otf') format('opentype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #f8f9fa;
            color: #222;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* --- BACKGROUND PHOTO EFFECT --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh; z-index: -1;
            opacity: 0.15;
            display: flex; align-items: center; justify-content: center;
            background-image: url('ariya.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            pointer-events: none;
            will-change: transform;
        }

        /* --- TOP ACCENT & HEADER --- */
        .top-accent {
            height: 40px;
            background-image: url('topper.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 4000;
        }

        header {
            height: 125px;
            padding-top: 40px; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.98)), url('farmersbg.png');
            background-size: cover;
            background-position: center;
            width: 100%;
            position: relative;
            border-bottom: 1px solid #eee;
        }
        .nav-logo { height: 60px; width: auto; }
        .ariya-badge { width: 55px; position: absolute; top: 55px; left: 15px; z-index: 2000; }
        .top-right-logo { width: 70px; position: absolute; top: 50px; right: 10px; z-index: 2000; }

        /* --- STICKY NAVIGATION --- */
        nav { 
            position: sticky; top: 40px; height: 60px; z-index: 3000; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee; width: 100%; display: flex; align-items: center;
        }
        .nav-container { position: relative; flex: 1; display: flex; justify-content: center; overflow-x: auto; scrollbar-width: none; }
        .nav-container::-webkit-scrollbar { display: none; }
        .nav-links { display: flex; list-style: none; gap: 5px; }
        .nav-links a {
            position: relative; z-index: 2; text-decoration: none; color: #0038A8; 
            font-family: 'Barabara', sans-serif; font-size: 13px;
            padding: 10px 16px; white-space: nowrap; transition: 0.3s;
        }
        .nav-slider {
            position: absolute; background: #FFD300; box-shadow: 2px 2px 0px #CE1126;
            border-radius: 5px; z-index: 1; height: 35px; top: 50%; transform: translateY(-50%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- PRODUCT LIST & ZOOM EFFECT --- */
        .product-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 20px; 
            padding-bottom: 60px;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.9); border-radius: 15px; padding: 15px;
            display: flex; gap: 15px; align-items: center;
            border: 1px solid #eee; transition: transform 0.4s ease, border-color 0.3s; 
            cursor: pointer;
        }
        .product-card:hover { 
            border-color: #FFD300; 
            transform: scale(0.96); /* Zoom out effect */
        }

        .card-left { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
        .product-card img { width: 85px; height: 85px; border-radius: 10px; object-fit: cover; }
        .list-price { font-weight: 800; color: #CE1126; font-size: 14px; font-family: 'Barabara'; }

        .card-mid { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .product-name { font-family: 'Barabara', sans-serif; color: #0038A8; font-size: 15px; text-transform: uppercase; margin-bottom: 2px; }
        .product-maker { font-size: 11px; font-weight: 700; color: #CE1126; margin-bottom: 5px; font-style: italic; }
        .product-description { font-size: 12px; color: #444; line-height: 1.4; }

        .add-cart-btn {
            background: #FFD300; color: #0038A8; width: 40px; height: 40px;
            border-radius: 8px; border: none; font-weight: 900; font-size: 20px;
            cursor: pointer; box-shadow: 2px 2px 0px #CE1126; flex-shrink: 0;
            transition: transform 0.2s;
        }
        .add-cart-btn:active { transform: translateY(2px); }

        /* --- CART UI --- */
        .cart-trigger {
            background: #0038A8; width: 44px; height: 44px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
            box-shadow: 2px 2px 0px #CE1126; flex-shrink: 0;
        }
        .cart-count {
            position: absolute; top: -8px; right: -8px; background: #CE1126;
            color: white; font-size: 10px; font-weight: 900; width: 22px;
            height: 22px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; border: 2px solid #fff;
        }
        .cart-sidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px;
            height: 100vh; background: #fff; z-index: 5000; transition: 0.4s;
            display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        .cart-sidebar.active { right: 0; }
        .cart-header { padding: 25px; background: #0038A8; color: white; font-family: 'Barabara'; display: flex; justify-content: space-between; align-items: center; }
        .cart-body { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-footer { padding: 25px; border-top: 1px solid #eee; }

        /* --- VIDEO & LAYOUT --- */
        .main-content { padding: 40px 20px; max-width: 1200px; width: 100%; display: flex; flex-direction: column; gap: 40px; }
        .video-side { width: 100%; max-width: 700px; margin: 0 auto; }
        .video-frame { 
            border-radius: 20px; overflow: hidden; aspect-ratio: 16/9;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); border: 8px solid #fff;
            background: #000; position: relative;
        }
        .video-frame iframe { width: 100%; height: 100%; border:none; }
        .video-label { 
            position: absolute; top: 15px; left: 15px; z-index: 10;
            font-family: 'Barabara'; font-size: 11px; color: #fff;
            background: rgba(0, 56, 168, 0.9); padding: 6px 12px; border-radius: 4px;
        }

        /* --- FOOTER --- */
        .site-footer {
            background-color: #00384d; color: #ffffff; padding: 50px 20px 30px 20px;
            width: 100%; font-family: 'Inter', sans-serif; margin-top: 60px;
            position: relative; z-index: 100; text-align: center;
        }
        .footer-bottom { 
            max-width: 1200px; margin: 0 auto; display: flex; 
            justify-content: space-between; align-items: center; font-size: 11px;
        }
        .admin-link { color: rgba(255,255,255,0.3); text-decoration: none; transition: 0.3s; }
        .admin-link:hover { color: #FFD300; }

        @media (min-width: 1024px) {
            .main-content { display: grid; grid-template-columns: 1fr 1.2fr; gap: 50px; padding: 60px 5%; align-items: start; }
            .video-side { position: sticky; top: 120px; }
        }
    </style>
</head>
<body>

    <div class="top-accent"></div>
    <img src="ariya.jpg" alt="Ariya Logo" class="ariya-badge">
    <img src="niyogyuganlogo.png" alt="Niyogyugan Logo" class="top-right-logo">

    <header>
        <a href="index.html"><img src="AlabatLogo.png" alt="Alabat Logo" class="nav-logo"></a>
    </header>

    <nav>
        <div class="nav-container">
            <div class="nav-slider" id="navShade"></div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="destinations.html">DESTINATIONS</a></li>
                <li><a href="products.html" id="activeLink">PRODUCTS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-content">
        <div class="video-side">
            <h1 style="font-family:'Barabara'; color:#0038A8; text-align:center; font-size: 32px; margin-bottom: 20px;">MADE WITH <span style="color:#CE1126">LOVE</span></h1>
            <div class="video-frame">
                <div class="video-label" id="currentVideoLabel">OUR PROCESS</div>
                <iframe id="processVideo" src="https://www.youtube.com/embed/TdZzwAT-FFw" allowfullscreen></iframe>
            </div>
        </div>

        <div class="product-grid-side">
            <div class="section-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-family:'Barabara'; color:#0038A8;">ISLAND SPECIALTIES</h2>
                <div class="cart-trigger" onclick="toggleCart()">
                    <span style="font-size: 18px;">🛒</span>
                    <div class="cart-count" id="cart-badge">0</div>
                </div>
            </div>
            <div class="product-list" id="products-list"></div>
        </div>
    </div>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">YOUR BASKET <span onclick="toggleCart()" style="cursor:pointer; font-size: 20px;">✕</span></div>
        <div class="cart-body" id="cart-items-list">
            <p style="text-align:center; color:#999; margin-top:20px;">Your basket is empty.</p>
        </div>
        <div class="cart-footer">
            <button style="width:100%; background:#CE1126; color:white; padding:15px; border-radius:8px; border:none; font-family:'Barabara'; cursor:pointer; font-size:16px;">CHECKOUT</button>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-bottom">
            <div>&copy; 2026 Alabat Island Tourism.</div>
            <div><a href="admin.html" class="admin-link">Admin Dashboard</a> | Developed by Alabat Coconetwork</div>
        </div>
    </footer>

    <script>
        // --- DATA & VIDEO MAPPING ---
        let inventory = JSON.parse(localStorage.getItem('alabat_products')) || [
            { name: "BALAT LITSON", price: "₱100.00", img: "balatlitchon.jpg", desc: "Alabat's signature crispy bread snack!", vid: "TdZzwAT-FFw" },
            { name: "BANANA CHIPS", price: "₱120.00", img: "bananachips.jpg", desc: "Crispy Saba slices glazed with natural coco honey.", vid: "pSD9s5_IVJk" },
            { name: "PURE HONEY", price: "₱350.00", img: "honey.jpg", desc: "Raw, organic honey harvested from local stingless bees.", vid: "B7YRdNexH3c" },
            { name: "DARK CHOCOLATE", price: "₱220.00", img: "darkchocolate.jpg", desc: "Premium Alabat cocoa blended with healthy coco sugar.", vid: "TdZzwAT-FFw" }
        ];

        function renderProducts() {
            const listDiv = document.getElementById('products-list');
            listDiv.innerHTML = inventory.map((prod) => `
                <div class="product-card" onclick="changeVideo('${prod.vid}', '${prod.name}')">
                    <div class="card-left">
                        <img src="${prod.img}">
                        <span class="list-price">${prod.price}</span>
                    </div>
                    <div class="card-mid">
                        <h3 class="product-name">${prod.name}</h3>
                        <p class="product-maker">100% natural made by Ate Eva</p>
                        <p class="product-description">${prod.desc}</p>
                    </div>
                    <button class="add-cart-btn" onclick="event.stopPropagation(); addToCart('${prod.name}', '${prod.price}')">+</button>
                </div>
            `).join('');
        }

        // Change video when a product card is clicked
        function changeVideo(videoId, productName) {
            const frame = document.getElementById('processVideo');
            const label = document.getElementById('currentVideoLabel');
            frame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            label.innerText = "MAKING: " + productName;
        }

        // --- CART LOGIC ---
        let cartCount = 0;
        function addToCart(name, price) {
            cartCount++;
            document.getElementById('cart-badge').innerText = cartCount;
            // Basic feedback for user
            const badge = document.getElementById('cart-badge');
            badge.style.transform = "scale(1.3)";
            setTimeout(() => badge.style.transform = "scale(1)", 200);
        }

        function toggleCart() { 
            document.getElementById('cartSidebar').classList.toggle('active'); 
        }

        // --- NAVIGATION SLIDER ---
        const shade = document.getElementById('navShade');
        const activeLink = document.getElementById('activeLink');
        function moveShade(el) {
            if (el) {
                shade.style.width = el.offsetWidth + 'px';
                shade.style.left = el.offsetLeft + 'px';
            }
        }

        window.addEventListener('load', () => {
            renderProducts();
            moveShade(activeLink);
        });
    </script>
</body>
</html>
