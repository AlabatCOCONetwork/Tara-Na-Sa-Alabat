<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Alabat Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('farmersbg.png') no-repeat center center fixed; 
            background-size: cover; color: white; min-height: 100vh; overflow-x: hidden;
        }

        /* --- LOGO & NAV (Removed Glow) --- */
        .top-left-logo {
            position: absolute; top: 20px; left: 20px; width: 100px; 
            z-index: 2000; opacity: 0.8;
        }

        .logo-wrapper { display: flex; justify-content: center; padding-top: 40px; width: 100%; }
        .nav-logo { height: 60px; filter: none; } /* Glow removed */

        nav { 
            display: flex; justify-content: center; align-items: center; 
            padding: 15px; position: sticky; top: 0; z-index: 1000; width: 100%;
        }

        .nav-container {
            position: relative; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 5px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; align-items: center; max-width: 90vw; overflow-x: auto; scrollbar-width: none;
        }
        
        .nav-links { display: flex; list-style: none; position: relative; z-index: 2; }
        .nav-links a { 
            color: white; text-decoration: none; font-size: 10px; font-weight: 700; 
            text-transform: uppercase; padding: 10px 18px; display: inline-block; 
            transition: 0.3s; opacity: 0.6; white-space: nowrap;
        }
        .nav-links a.active { opacity: 1; }
        
        .nav-slider {
            position: absolute; height: calc(100% - 10px);
            background: rgba(0, 174, 239, 0.5); border-radius: 50px;
            top: 5px; z-index: 1; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- CART UI (Removed Glow) --- */
        .cart-trigger { 
            margin-left: 15px; position: relative; cursor: pointer; 
            background: #00AEEF; width: 45px; height: 45px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: none; /* Glow removed */
        }
        .cart-count { 
            position: absolute; top: -2px; right: -2px; background: #ff4757; 
            color: white; font-size: 10px; font-weight: 900; width: 20px; 
            height: 20px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; border: 2px solid white;
        }
        
        /* --- PRODUCT CARDS --- */
        .product-list { display: flex; flex-direction: column; gap: 20px; }
        .product-card { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); 
            padding: 20px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; gap: 20px; cursor: pointer; transition: 0.3s;
        }
        .product-card:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-5px); }
        .product-card img { width: 100px; height: 100px; border-radius: 20px; object-fit: cover; }
        .product-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .product-name { font-size: 16px; font-weight: 900; color: #00AEEF; text-transform: uppercase; }
        .product-description { font-size: 12px; opacity: 0.7; margin: 5px 0; }
        .list-price { font-weight: 900; font-size: 15px; }

        .add-cart-btn { 
            background: white; color: black; width: 40px; height: 40px; 
            border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; font-size: 20px; border: none;
            cursor: pointer;
        }

        /* --- PRODUCT MODAL (Zoom Detail) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center;
            z-index: 5000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white; color: #111; max-width: 500px; width: 100%;
            border-radius: 30px; overflow: hidden; position: relative;
            transform: scale(0.7); opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-content { transform: scale(1); opacity: 1; }
        .modal-img { width: 100%; height: 300px; object-fit: cover; }
        .modal-body { padding: 30px; }
        .modal-body h2 { color: #00AEEF; font-weight: 900; margin-bottom: 10px; }
        .modal-body p { opacity: 0.8; line-height: 1.6; margin-bottom: 20px; }
        .modal-close {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5);
            color: white; border: none; width: 35px; height: 35px; border-radius: 50%;
            cursor: pointer; font-weight: 900;
        }

        /* --- OTHER UI --- */
        .cart-sidebar { 
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; 
            height: 100vh; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); 
            z-index: 3000; padding: 30px 20px; transition: 0.5s; 
            color: #1a1a1a; display: flex; flex-direction: column;
        }
        .cart-sidebar.active { right: 0; }
        .main-content { display: flex; flex-direction: column; padding: 20px 5% 80px; gap: 20px; }
        @media (min-width: 1100px) { .main-content { flex-direction: row; padding: 40px 8%; gap: 60px; } }
        .made-with-love { font-size: clamp(32px, 7vw, 55px); font-weight: 900; line-height: 0.9; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <img src="ariya.jpg" alt="Ariya Brand Logo" class="top-left-logo">

    <div class="logo-wrapper">
        <a href="index.html"><img src="AlabatLogo.png" alt="Alabat Tourism Logo" class="nav-logo"></a>
    </div>

    <nav>
        <div class="nav-container">
            <div class="nav-slider" id="navShade"></div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="destinations.html">DESTINATIONS</a></li>
                <li><a href="products.html" id="activeLink" class="active">PRODUCTS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>
        <div class="cart-trigger" onclick="toggleCart()">
            <span>🛒</span>
            <div class="cart-count" id="cart-badge">0</div>
        </div>
    </nav>

    <div class="main-content">
        <div class="video-side">
            <h1 class="made-with-love">MADE WITH LOVE<br>JUST FOR YOU!</h1>
            </div>

        <div class="slider-section">
            <div class="product-list" id="products-list"></div>
        </div>
    </div>

    <div class="modal-overlay" id="productModal" onclick="closeModal(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal(event)">✕</button>
            <img src="" id="modalImg" class="modal-img">
            <div class="modal-body">
                <h2 id="modalName"></h2>
                <p id="modalDesc"></p>
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <h3 id="modalPrice" style="font-weight: 900; font-size: 1.5rem;"></h3>
                    <button id="modalAddBtn" class="add-cart-btn" style="width: auto; padding: 0 25px; border-radius: 50px;">ADD TO BASKET</button>
                </div>
            </div>
        </div>
    </div>

    <div class="cart-sidebar" id="cartSidebar">
        </div>

    <script>
        // Inventory Data (Including the missing comma fix)
        const inventory = [
            { name: "BALAT LITSON", price: "₱100.00", content: "100% Pure Organic", img: "balatlitchon.jpg", desc: "Alabat's signature crispy bread snack! Thin, toasted strips that mimic the irresistible crunch of roasted pig skin.", available: true },
            { name: "BANANA CHIPS", price: "₱120.00", content: "100% Pure Organic", img: "bananachips.jpg", desc: "Crispy, golden 'Saba' banana slices lightly coated with Alabat coco sugar and honey.", available: true },
            { name: "PURE HONEY", price: "₱350.00", content: "Tres Princesitas Farm", img: "honey.jpg", desc: "Raw and unprocessed honey harvested from local stingless bees.", available: true },
            { name: "70% DARK CHOCOLATE", price: "₱220.00", content: "100% Pure Organic", img: "darkchocolate.jpg", desc: "Premium fine cocoa blended with coco sugar and cocoa butter.", available: true },
            { name: "HOMEMADE PEANUT BUTTER", price: "₱160.00", content: "100% Pure Organic", img: "peanutbutter.jpg", desc: "Creamy, smooth, and naturally sweet made from slow-roasted peanuts.", available: true },
            { name: "ATSARA PAPAYA", price: "₱140.00", content: "100% Pure Organic", img: "atsara.jpg", desc: "A classic Filipino side dish of pickled grated papaya and carrots.", available: true },
            { name: "ATSARA UBOD", price: "₱160.00", content: "100% Pure Organic", img: "atsarau.jpg", desc: "A unique island delicacy made from pickled heart of palm (Ubod).", available: true },
            { name: "PURE HONEY (ROSEMAY)", price: "₱380.00", content: "By Rosemay", img: "honeyrose.jpg", desc: "Specialty infused honey from Minorico's Agri Farm.", available: true },
            { name: "COCO SUGAR", price: "₱180.00", content: "100% Pure Organic", img: "coco-sugar.jpg", desc: "Healthy alternative sugar produced from Alabat coconuts.", available: true },
            { name: "CACAO BRITTLE", price: "₱150.00", content: "100% Pure Organic", img: "kakaobrittle.jpg", desc: "Thin, crunchy, and intensely chocolatey.", available: true }
        ];

        function renderProducts() {
            const listDiv = document.getElementById('products-list');
            listDiv.innerHTML = inventory.map((prod, index) => {
                const isAvail = prod.available !== false;
                return `
                    <div class="product-card" onclick="openModal(${index})">
                        <img src="${prod.img}" style="${isAvail ? '' : 'filter:grayscale(1); opacity:0.5;'}">
                        <div class="product-info">
                            <h3 class="product-name">${prod.name}</h3>
                            <p class="product-description">${prod.desc}</p>
                            <span class="list-price">${prod.price}</span>
                        </div>
                        <div style="display:flex; align-items:center;">
                            ${isAvail ? 
                                `<button class="add-cart-btn" onclick="event.stopPropagation(); addToCart('${prod.name}', '${prod.img}', '${prod.price}')">+</button>` : 
                                `<span class="sold-out-badge">SOLD OUT</span>`}
                        </div>
                    </div>`;
            }).join('');
        }

        // --- MODAL ZOOM LOGIC ---
        function openModal(index) {
            const prod = inventory[index];
            document.getElementById('modalImg').src = prod.img;
            document.getElementById('modalName').innerText = prod.name;
            document.getElementById('modalDesc').innerText = prod.desc + " " + prod.content;
            document.getElementById('modalPrice').innerText = prod.price;
            
            document.getElementById('modalAddBtn').onclick = () => {
                addToCart(prod.name, prod.img, prod.price);
                closeModal();
            };

            document.getElementById('productModal').classList.add('active');
        }

        function closeModal(e) {
            if (!e || e.target.id === 'productModal' || e.target.className === 'modal-close') {
                document.getElementById('productModal').classList.remove('active');
            }
        }

        // --- NAVIGATION & CART ---
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
        let cart = JSON.parse(localStorage.getItem('alabat_cart')) || [];

        function addToCart(name, img, price) {
            const item = cart.find(i => i.name === name);
            if (item) item.quantity++; else cart.push({ name, img, price, quantity: 1 });
            updateCart();
            if(!document.getElementById('cartSidebar').classList.contains('active')) toggleCart();
        }

        function updateCart() {
            localStorage.setItem('alabat_cart', JSON.stringify(cart));
            document.getElementById('cart-badge').innerText = cart.reduce((s, i) => s + i.quantity, 0);
            // Redraw cart items list logic here...
        }

        renderProducts();
    </script>
</body>
</html>
