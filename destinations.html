<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations | Alabat Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* --- MASTER FONT --- */
        @font-face {
            font-family: 'Barabara';
            src: url('BARABARA-final.otf') format('opentype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #f8f9fa;
            color: #222;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
            /* --- BACKGROUND PHOTO EFFECT --- */
body::before {
    content: "";
    position: fixed;
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    /* 1. Changed to ariya.png */
    background: url('ariya.png') no-repeat center center fixed;
    /* 2. Changed 'cover' to 'contain' so the logo fits the screen without cropping */
    background-size: contain; 
    /* 3. Added a small padding so the logo doesn't touch the screen edges on mobile */
    background-origin: content-box;
    padding: 10%; 
    opacity: 0.15; 
    z-index: -1;
}

        /* --- BRANDED PATTERN TOP BAR --- */
        .top-accent {
            height: 40px;
            background-image: url('topper.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 4000;
            border-bottom: 0px solid #fff;
        }

        /* --- HEADER AREA (FIXED HEIGHT) --- */
        header {
            height: 125px; /* Fixed height to prevent jumping */
            padding-top: 40px; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.9)), url('farmersbg.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .nav-logo { height: 60px; width: auto; }

        /* --- SIDE LOGOS (LOCKED POSITION) --- */
        .top-left-logo { width: 55px; position: absolute; top: 55px; left: 15px; z-index: 2000; }
        .top-right-logo { width: 70px; position: absolute; top: 50px; right: 10px; z-index: 2000; }
/* --- HEADER & BRANDING (STANDARDIZED) --- */
        header {
            height: 125px;
            padding-top: 40px; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.98)), url('background.jpg');
            background-size: cover;
            background-position: center;
            width: 100%;
            position: relative;
            border-bottom: 1px solid #eee;
        }
        .nav-logo { height: 60px; width: auto; }
        .ariya-badge { width: 55px; position: absolute; top: 55px; left: 15px; z-index: 2000; }
        .top-right-logo { width: 70px; position: absolute; top: 50px; right: 10px; z-index: 2000; }

        /* --- STICKY NAVIGATION (STANDARDIZED) --- */
        nav { 
            position: sticky; 
            top: 40px; 
            height: 60px;
            z-index: 3000; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            width: 100%;
            display: flex; align-items: center;
        }
        .nav-container {
            position: relative; flex: 1; display: flex; 
            justify-content: center;
            overflow-x: auto; scrollbar-width: none;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-links { display: flex; list-style: none; gap: 5px; }
        .nav-links a {
            position: relative; z-index: 2;
            text-decoration: none; color: #0038A8; 
            font-family: 'Barabara', sans-serif; font-size: 13px;
            padding: 10px 16px; white-space: nowrap; transition: 0.3s;
        }

        .nav-slider {
            position: absolute; background: #FFD300;
            box-shadow: 2px 2px 0px #CE1126; border-radius: 5px;
            z-index: 1; height: 35px; top: 50%; transform: translateY(-50%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        /* --- 4. HERO SECTION --- */
        .adventure-container { 
            padding: 60px 20px; 
            text-align: center;
            display: flex; 
            flex-direction: column; 
            gap: 40px;
            max-width: 1200px;
            width: 100%;
        }
        .adventure-text { 
            font-family: 'Barabara', sans-serif;
            font-size: clamp(38px, 8vw, 60px); 
            color: #0038A8; 
            line-height: 1;
            text-transform: uppercase;
        }
        .adventure-text span { color: #CE1126; }

        .book-now-btn { 
            display: inline-block; padding: 12px 30px; 
            background: #CE1126; color: white; text-decoration: none;
            font-family: 'Barabara', sans-serif; border-radius: 5px;
            box-shadow: 3px 3px 0px #FFD300; transition: 0.2s;
            margin-top: 20px;
        }
        .book-now-btn:hover { transform: scale(1.05); }

        /* --- 5. MINIMALIST VIDEO BOX --- */
        .video-wrapper { width: 100%; max-width: 700px; margin: 0 auto; position: relative; }
        .video-frame { 
            border-radius: 20px; border: 8px solid #fff; overflow: hidden;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); background: #000;
            aspect-ratio: 16/9;
            position: relative;
        }
        .video-frame iframe { width: 100%; height: 100%; }
        
        .video-label { 
            position: absolute; top: 20px; left: 20px; z-index: 10;
            font-family: 'Barabara'; font-size: 12px; color: #fff;
            background: rgba(0, 56, 168, 0.9); padding: 8px 15px; 
            border-radius: 4px;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .video-controls { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 20px; 
        }
        
        .video-nav-btn {
            background: #fff; border: 1px solid #ddd; width: 45px; height: 45px;
            cursor: pointer; font-size: 16px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            color: #0038A8;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .video-nav-btn:hover { background: #FFD300; border-color: #FFD300; transform: translateY(-2px); }

        /* --- 6. HORIZONTAL SCROLL SLIDER --- */
        .slider-container { 
            width: 100%;
            padding: 60px 0;
            background: #fff;
        }
        .slider-wrapper { 
            display: flex; gap: 20px; overflow-x: auto; 
            padding: 20px 20px 40px; scrollbar-width: none;
        }
        .slider-wrapper::-webkit-scrollbar { display: none; }

        .destination-card { 
            flex: 0 0 300px; background: #fff; border-radius: 20px; 
            padding: 15px; border: 1px solid #eee; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .destination-card:hover { transform: translateY(-10px); border-color: #FFD300; }
        .destination-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; }
        .destination-card h3 { font-family: 'Barabara'; color: #0038A8; font-size: 18px; }
        .destination-card p { font-size: 13px; color: #666; margin-top: 5px; }

        /* --- MODAL --- */
        .zoom-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); display: none; z-index: 5000; 
            padding: 20px; flex-direction: column; align-items: center; justify-content: center;
        }
        .zoom-overlay.active { display: flex; }
        .zoom-card { width: 100%; max-width: 600px; text-align: center; }
        .zoom-img { width: 100%; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .zoom-title { font-family: 'Barabara'; color: #0038A8; font-size: 32px; margin-top: 25px; }
        .zoom-desc { font-size: 16px; color: #444; margin: 15px 0; max-width: 500px; margin-inline: auto; }
        .close-zoom { position: absolute; top: 30px; right: 30px; font-size: 30px; color: #CE1126; cursor: pointer; border: none; background: none; font-family: 'Barabara'; }

        /* RESPONSIVE TWEAKS */
        @media (max-width: 480px) {
            header { height: 110px; }
            .ariya-badge { width: 45px; top: 50px; }
            .top-right-logo { width: 60px; top: 45px; }
            .nav-logo { height: 45px; }
            nav { height: 50px; top: 40px; }
            .nav-links a { font-size: 10px; padding: 10px 8px; }
            .adventure-text { font-size: 34px; }
            .destination-card { flex: 0 0 260px; }
        }

        @media (min-width: 1024px) {
            .adventure-container { flex-direction: row; text-align: left; padding: 80px 5%; align-items: center; justify-content: space-between; }
            .adventure-text-box { flex: 1; }
            .video-wrapper { flex: 1; }
        }
    </style>
</head>
<body>

    <div class="top-accent"></div>
    <img src="ariya.jpg" alt="Ariya Logo" class="ariya-badge">
    <img src="niyogyuganlogo.png" alt="Niyogyugan Logo" class="top-right-logo">

    <header>
        <a href="index.html">
            <img src="AlabatLogo.png" alt="Alabat Tourism" class="nav-logo">
        </a>
    </header>

    <nav>
        <div class="nav-container">
            <div class="nav-slider" id="navShade"></div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="destinations.html" id="activeLink">DESTINATIONS</a></li>
                <li><a href="products.html">PRODUCTS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom(event)">
        <button class="close-zoom" onclick="closeZoom(event)">✕</button>
        <div class="zoom-card">
            <img src="" id="zoomImg" class="zoom-img">
            <h2 id="zoomTitle" class="zoom-title"></h2>
            <p id="zoomDesc" class="zoom-desc"></p>
        </div>
    </div>

    <div class="adventure-container">
        <div class="adventure-text-box">
            <div class="adventure-text">YOUR NEXT<br><span>ADVENTURE</span><br>AWAITS</div>
            <a href="contact.html" class="book-now-btn">PLAN YOUR TRIP</a>
        </div>
        <div class="video-wrapper">
            <div class="video-frame">
                <div class="video-label" id="videoTitle">DISCOVER ALABAT</div>
                <iframe id="videoPlayer" 
                        src="https://www.youtube.com/embed/J_i3Oupb4R4?autoplay=0&loop=1&playlist=J_i3Oupb4R4" 
                        allow="autoplay; encrypted-media" allowfullscreen>
                </iframe>
            </div>
            <div class="video-controls">
                <button class="video-nav-btn" onclick="prevVideo()">&#10094;</button>
                <button class="video-nav-btn" onclick="nextVideo()">&#10095;</button>
            </div>
        </div>
    </div>

    <div class="slider-container">
        <h2 style="font-family:'Barabara'; color:#0038A8; padding: 0 40px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">Popular Spots</h2>
        <div class="slider-wrapper" id="destinations-list"></div>
    </div>

    <script>
        // Nav Slider
        const shade = document.getElementById('navShade');
        const activeLink = document.getElementById('activeLink');
        function moveShade(el) {
            if(el) {
                shade.style.width = el.offsetWidth + 'px';
                shade.style.left = el.offsetLeft + 'px';
            }
        }
        window.addEventListener('load', () => moveShade(activeLink));
        window.addEventListener('resize', () => moveShade(activeLink));

        // Video Control
        const vTitle = document.getElementById('videoTitle');
        const videoFrame = document.getElementById('videoPlayer');
        const myVideos = [
            { title: "DISCOVER ALABAT", id: "J_i3Oupb4R4" },
            { title: "ALABAT ISLAND EXPERIENCE", id: "VEgYSAwmH4c" }
        ];
        let vIdx = 0;

        function updateVideo() {
            const vid = myVideos[vIdx];
            videoFrame.src = `https://www.youtube.com/embed/${vid.id}?autoplay=1&loop=1&playlist=${vid.id}`;
            vTitle.innerText = vid.title;
            vTitle.style.opacity = '1';
            setTimeout(() => { vTitle.style.opacity = '0.7'; }, 2000);
        }
        function nextVideo() { vIdx = (vIdx + 1) % myVideos.length; updateVideo(); }
        function prevVideo() { vIdx = (vIdx - 1 + myVideos.length) % myVideos.length; updateVideo(); }

        // Destinations Data
        const myDestinations = [
            { name: "Pulong Bato", img: "pulongbato.jpg", short: "Iconic white rock formation.", long: "Pulong Bato is one of Alabat's most famous natural landmarks, featuring a stunning white stone structure surrounded by crystal clear waters." },
            { name: "Alabat Cove", img: "alabatcove.jpg", short: "Golden sunsets and calm seas.", long: "A serene escape offering breathtaking golden sunsets. The calm waters make it an ideal spot for peaceful afternoons." },
            { name: "Tumiis Falls", img: "tumiisfalls.jpg", short: "Hidden multi-tiered waterfall.", long: "Nestled deep in the lush greenery, Tumiis Falls features multiple levels of refreshing spring water cascades." },
            { name: "Tumiis Peak", img: "tumiispeak.jpg", short: "High-altitude panoramic views.", long: "The best vantage point on the island, providing a 360-degree view of the surrounding ocean and green landscapes." }
        ];

        const listDiv = document.getElementById('destinations-list');
        myDestinations.forEach((dest, index) => {
            listDiv.innerHTML += `
                <div class="destination-card" onclick="openZoom(${index})">
                    <img src="${dest.img}" alt="${dest.name}">
                    <h3>${dest.name}</h3>
                    <p>${dest.short}</p>
                </div>`;
        });

        function openZoom(index) {
            const dest = myDestinations[index];
            document.getElementById('zoomImg').src = dest.img;
            document.getElementById('zoomTitle').innerText = dest.name;
            document.getElementById('zoomDesc').innerText = dest.long;
            document.getElementById('zoomOverlay').classList.add('active');
        }

        function closeZoom(e) {
            if (e.target.id === 'zoomOverlay' || e.target.className === 'close-zoom') {
                document.getElementById('zoomOverlay').classList.remove('active');
            }
        }
    </script>
</body>
</html>
