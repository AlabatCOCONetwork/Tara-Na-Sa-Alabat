<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations | Alabat Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* --- LOCAL FONT --- */
        @font-face {
            font-family: 'Barabara';
            src: url('BARABARA-final.otf') format('opentype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #ffffff;
            color: #222;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- PHILIPPINE FLAG TOP BAR --- */
        .top-accent {
            height: 6px;
            background: linear-gradient(90deg, #0038A8 25%, #CE1126 25%, #CE1126 50%, #FFD300 50%, #FFD300 75%, #00AF66 75%);
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 3000;
        }

        /* --- HEADER AREA --- */
        header {
            padding: 50px 20px 15px;
            display: flex;
            justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.9)), url('farmersbg.png');
            background-size: cover;
            background-position: center;
        }
        .nav-logo { height: 60px; width: auto; }
        .top-left-logo { width: 55px; position: absolute; top: 20px; left: 15px; z-index: 2000; }

        /* --- STICKY NAV --- */
        nav { 
            position: sticky; top: 6px; z-index: 1000; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
        .nav-container {
            position: relative; display: flex; 
            overflow-x: auto; scrollbar-width: none;
            padding: 0 15px;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-links { display: flex; list-style: none; gap: 5px; }
        .nav-links a {
            position: relative; z-index: 2;
            text-decoration: none; color: #0038A8; 
            font-family: 'Barabara', sans-serif; font-size: 13px;
            padding: 10px 16px; white-space: nowrap; transition: 0.3s;
        }

        .nav-slider {
            position: absolute; background: #FFD300;
            box-shadow: 2px 2px 0px #CE1126; border-radius: 5px;
            z-index: 1; height: 35px; top: 50%; transform: translateY(-50%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- HERO SECTION --- */
        .adventure-container { 
            padding: 30px 20px; text-align: center;
            display: flex; flex-direction: column; gap: 20px;
        }
        .adventure-text { 
            font-family: 'Barabara', sans-serif;
            font-size: 38px; color: #0038A8; line-height: 1;
            text-transform: uppercase;
        }
        .book-now-btn { 
            display: inline-block; padding: 12px 30px; 
            background: #CE1126; color: white; text-decoration: none;
            font-family: 'Barabara', sans-serif; border-radius: 5px;
            box-shadow: 3px 3px 0px #FFD300; transition: 0.2s;
            margin: 10px 0;
        }

        /* --- VIDEO BOX --- */
        .video-wrapper { width: 100%; max-width: 600px; margin: 0 auto; position: relative; }
        .video-frame { 
            border-radius: 20px; border: 4px solid #fff; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: #000;
            aspect-ratio: 16/9;
        }
        .video-frame iframe { width: 100%; height: 100%; }
        .video-label { 
            position: absolute; top: 15px; left: 15px; z-index: 10;
            font-family: 'Barabara'; font-size: 12px; color: #fff;
            background: rgba(0, 56, 168, 0.8); padding: 5px 12px; border-radius: 4px;
        }
        .video-controls { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .video-nav-btn {
            background: #fff; border: 2px solid #eee; width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; font-size: 18px;
        }

        /* --- HORIZONTAL SCROLL SLIDER --- */
        .slider-container { 
            padding: 40px 0;
            background: linear-gradient(to bottom, #fff, #f9f9f9);
        }
        .slider-wrapper { 
            display: flex; gap: 20px; overflow-x: auto; 
            padding: 10px 20px 30px; scrollbar-width: none;
        }
        .slider-wrapper::-webkit-scrollbar { display: none; }

        .destination-card { 
            flex: 0 0 280px; background: #fff; border-radius: 20px; 
            padding: 15px; border: 1px solid #eee; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .destination-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; }
        .destination-card h3 { font-family: 'Barabara'; color: #0038A8; font-size: 18px; }
        .destination-card p { font-size: 13px; color: #666; margin-top: 5px; }

        /* --- MODAL --- */
        .zoom-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; display: none; z-index: 5000; 
            padding: 20px; flex-direction: column; align-items: center; justify-content: center;
        }
        .zoom-overlay.active { display: flex; }
        .zoom-card { width: 100%; max-width: 500px; text-align: center; }
        .zoom-img { width: 100%; border-radius: 15px; border: 5px solid #FFD300; }
        .zoom-title { font-family: 'Barabara'; color: #0038A8; font-size: 28px; margin-top: 20px; }
        .zoom-desc { font-size: 15px; color: #444; margin: 15px 0; }
        .close-zoom { position: absolute; top: 20px; right: 20px; font-size: 35px; color: #CE1126; cursor: pointer; border: none; background: none; font-family: 'Barabara'; }

        /* Tablet/Desktop Tweaks */
        @media (min-width: 1024px) {
            .adventure-container { flex-direction: row; text-align: left; padding: 60px 10%; justify-content: space-between; }
            .adventure-text { font-size: 60px; }
            .destination-card { flex: 0 0 320px; }
        }
    </style>
</head>
<body>

    <div class="top-accent"></div>
    <img src="ariya.jpg" alt="Ariya" class="top-left-logo">

    <header>
        <a href="index.html">
            <img src="AlabatLogo.png" alt="Alabat Logo" class="nav-logo">
        </a>
    </header>

    <nav>
        <div class="nav-container">
            <div class="nav-slider" id="navShade"></div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="destinations.html" id="activeLink">DESTINATIONS</a></li>
                <li><a href="products.html">PRODUCTS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom(event)">
        <button class="close-zoom" onclick="closeZoom(event)">✕</button>
        <div class="zoom-card">
            <img src="" id="zoomImg" class="zoom-img">
            <h2 id="zoomTitle" class="zoom-title"></h2>
            <p id="zoomDesc" class="zoom-desc"></p>
        </div>
    </div>

    <div class="adventure-container">
        <div class="adventure-text-box">
            <div class="adventure-text">YOUR NEXT<br>ADVENTURE<br>AWAITS</div>
            <a href="contact.html" class="book-now-btn">BOOK NOW</a>
        </div>
        <div class="video-wrapper">
            <div class="video-frame">
                <div class="video-label" id="videoTitle">DISCOVER ALABAT</div>
                <iframe id="videoPlayer" 
                        src="https://www.youtube.com/embed/J_i3Oupb4R4?autoplay=0&loop=1&playlist=J_i3Oupb4R4" 
                        allow="autoplay; encrypted-media" allowfullscreen>
                </iframe>
            </div>
            <div class="video-controls">
                <button class="video-nav-btn" onclick="prevVideo()">&#10094;</button>
                <button class="video-nav-btn" onclick="nextVideo()">&#10095;</button>
            </div>
        </div>
    </div>

    <div class="slider-container">
        <h2 style="font-family:'Barabara'; color:#0038A8; padding: 0 20px; margin-bottom: 10px;">POPULAR SPOTS</h2>
        <div class="slider-wrapper" id="destinations-list"></div>
    </div>

    <script>
        // Nav Slider Logic
        const shade = document.getElementById('navShade');
        const activeLink = document.getElementById('activeLink');
        function moveShade(el) {
            shade.style.width = el.offsetWidth + 'px';
            shade.style.left = el.offsetLeft + 'px';
        }
        window.addEventListener('load', () => moveShade(activeLink));
        window.addEventListener('resize', () => moveShade(activeLink));

        // Video Playlist Logic
        const videoFrame = document.getElementById('videoPlayer');
        const videoTitle = document.getElementById('videoTitle');
        const myVideos = [
            { title: "DISCOVER ALABAT", id: "J_i3Oupb4R4" },
            { title: "ALABAT ISLAND EXPERIENCE", id: "VEgYSAwmH4c" }
        ];
        let vIdx = 0;
        function updateVideo() {
            const vid = myVideos[vIdx];
            videoFrame.src = `https://www.youtube.com/embed/${vid.id}?autoplay=1&loop=1&playlist=${vid.id}`;
            videoTitle.innerText = vid.title;
        }
        function nextVideo() { vIdx = (vIdx + 1) % myVideos.length; updateVideo(); }
        function prevVideo() { vIdx = (vIdx - 1 + myVideos.length) % myVideos.length; updateVideo(); }

        // Destination Data
        const myDestinations = [
            { name: "Pulong Bato", img: "pulongbato.jpg", short: "Iconic white rock formation.", long: "Pulong Bato is one of Alabat's most famous natural landmarks, featuring a stunning white stone structure surrounded by crystal clear waters." },
            { name: "Alabat Cove", img: "alabatcove.jpg", short: "Golden sunsets and calm seas.", long: "A serene escape offering breathtaking golden sunsets. The calm waters make it an ideal spot for peaceful afternoons." },
            { name: "Tumiis Falls", img: "tumiisfalls.jpg", short: "Hidden multi-tiered waterfall.", long: "Nestled deep in the lush greenery, Tumiis Falls features multiple levels of refreshing spring water cascades." },
            { name: "Tumiis Peak", img: "tumiispeak.jpg", short: "High-altitude panoramic views.", long: "The best vantage point on the island, providing a 360-degree view of the surrounding ocean and green landscapes." }
        ];

        const listDiv = document.getElementById('destinations-list');
        myDestinations.forEach((dest, index) => {
            listDiv.innerHTML += `
                <div class="destination-card" onclick="openZoom(${index})">
                    <img src="${dest.img}" alt="${dest.name}">
                    <h3>${dest.name}</h3>
                    <p>${dest.short}</p>
                </div>`;
        });

        function openZoom(index) {
            const dest = myDestinations[index];
            document.getElementById('zoomImg').src = dest.img;
            document.getElementById('zoomTitle').innerText = dest.name;
            document.getElementById('zoomDesc').innerText = dest.long;
            document.getElementById('zoomOverlay').classList.add('active');
        }

        function closeZoom(e) {
            if (e.target.id === 'zoomOverlay' || e.target.className === 'close-zoom') {
                document.getElementById('zoomOverlay').classList.remove('active');
            }
        }
    </script>
</body>
</html>
    </script>
</body>
</html>
