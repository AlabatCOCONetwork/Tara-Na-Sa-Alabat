<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tara na sa Alabat! | Home</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* --- MASTER FONT --- */
        @font-face {
            font-family: 'Barabara';
            src: url('BARABARA-final.otf') format('opentype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #f8f9fa;
            color: #222;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- 1. TOP BAR (PATTERN) --- */
        .top-accent {
            height: 40px;
            background-image: url('topper.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 4000;
        }

        /* --- 2. HEADER & BRANDING --- */
        header {
            height: 125px;
            padding-top: 40px; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.98)), url('farmersbg.png');
            background-size: cover;
            background-position: center;
            width: 100%;
            position: relative;
            border-bottom: 1px solid #eee;
        }
        .nav-logo { height: 60px; width: auto; }
        .ariya-badge { width: 55px; position: absolute; top: 55px; left: 15px; z-index: 2000; }
        .top-right-logo { width: 70px; position: absolute; top: 50px; right: 10px; z-index: 2000; }

        /* --- 3. STICKY SLIDING NAV (FIXED TO SCREEN) --- */
        nav { 
            position: sticky; 
            top: 40px; 
            height: 60px;
            z-index: 3000; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            width: 100%;
            display: flex; 
            justify-content: center;
            align-items: center;
        }
        .nav-container {
            position: relative; 
            width: 100%;
            max-width: 1200px;
            display: flex; 
            justify-content: center;
            align-items: center;
            padding: 0 10px;
        }
        
        .nav-links { 
            display: flex; 
            list-style: none; 
            gap: 2px; /* Tight gap to ensure it fits mobile */
            width: 100%;
            justify-content: center;
        }
        .nav-links a {
            position: relative; z-index: 2;
            text-decoration: none; color: #0038A8; 
            font-family: 'Barabara', sans-serif; font-size: 13px;
            padding: 10px 14px; white-space: nowrap; transition: 0.3s;
        }

        .nav-slider {
            position: absolute; background: #FFD300;
            box-shadow: 2px 2px 0px #CE1126; border-radius: 5px;
            z-index: 1; height: 35px; top: 50%; transform: translateY(-50%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- 4. HERO SECTION --- */
        .adventure-container { 
            padding: 60px 20px; 
            text-align: center;
            display: flex; 
            flex-direction: column; 
            gap: 40px;
            max-width: 1200px;
            width: 100%;
        }
        .adventure-text { 
            font-family: 'Barabara', sans-serif;
            font-size: clamp(38px, 8vw, 60px); 
            color: #0038A8; 
            line-height: 1;
            text-transform: uppercase;
        }
        .adventure-text span { color: #CE1126; }

        .book-now-btn { 
            display: inline-block; padding: 12px 30px; 
            background: #CE1126; color: white; text-decoration: none;
            font-family: 'Barabara', sans-serif; border-radius: 5px;
            box-shadow: 3px 3px 0px #FFD300; transition: 0.2s;
            margin-top: 20px;
        }

        /* --- 5. VIDEO BOX --- */
        .video-wrapper { width: 100%; max-width: 700px; margin: 0 auto; position: relative; }
        .video-frame { 
            border-radius: 20px; border: 8px solid #fff; overflow: hidden;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); background: #000;
            aspect-ratio: 16/9; position: relative;
        }
        .video-frame iframe { width: 100%; height: 100%; border: none; }
        
        .video-label { 
            position: absolute; top: 20px; left: 20px; z-index: 10;
            font-family: 'Barabara'; font-size: 12px; color: #fff;
            background: rgba(0, 56, 168, 0.9); padding: 8px 15px; border-radius: 4px;
        }

        /* RESPONSIVE TWEAKS */
        @media (max-width: 480px) {
            header { height: 110px; }
            .ariya-badge { width: 45px; top: 50px; }
            .top-right-logo { width: 60px; top: 45px; }
            .nav-logo { height: 45px; }
            nav { height: 50px; }
            .nav-links a { font-size: 10px; padding: 10px 6px; letter-spacing: -0.5px; }
            .adventure-text { font-size: 34px; }
        }

        @media (min-width: 1024px) {
            .adventure-container { flex-direction: row; text-align: left; padding: 80px 5%; align-items: center; justify-content: space-between; }
            .adventure-text-box { flex: 1; }
            .video-wrapper { flex: 1; }
        }
    </style>
</head>
<body>

    <div class="top-accent"></div>
    <img src="ariya.jpg" alt="Ariya Logo" class="ariya-badge">
    <img src="niyogyuganlogo.png" alt="Niyogyugan Logo" class="top-right-logo">

    <header>
        <a href="index.html">
            <img src="AlabatLogo.png" alt="Alabat Tourism" class="nav-logo">
        </a>
    </header>

    <nav>
        <div class="nav-container">
            <div class="nav-slider" id="navShade"></div>
            <ul class="nav-links">
                <li><a href="index.html" id="activeLink">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="destinations.html">DESTINATIONS</a></li>
                <li><a href="products.html">PRODUCTS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <div class="adventure-container">
        <div class="adventure-text-box">
            <div class="adventure-text">TARA NA SA<br><span>ALABAT!</span><br>EXPLORE NOW</div>
            <a href="destinations.html" class="book-now-btn">START EXPLORING</a>
        </div>
        <div class="video-wrapper">
            <div class="video-frame">
                <div class="video-label" id="videoTitle">DISCOVER ALABAT</div>
                <iframe id="videoPlayer" 
                        src="https://www.youtube.com/embed/pSD9s5_IVJk?autoplay=1&mute=1&loop=1&playlist=pSD9s5_IVJk" 
                        allow="autoplay; encrypted-media" allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>

    <script>
        // Nav Slider Logic
        const shade = document.getElementById('navShade');
        const activeLink = document.getElementById('activeLink');
        function moveShade(el) {
            if(el) {
                shade.style.width = el.offsetWidth + 'px';
                shade.style.left = el.offsetLeft + 'px';
            }
        }
        window.addEventListener('load', () => moveShade(activeLink));
        window.addEventListener('resize', () => moveShade(activeLink));
    </script>
</body>
</html>
