<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tara na sa Alabat! | Home</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alabatcoconetwork.github.io/Tara-Na-Sa-Alabat/index.html">
    <meta property="og:title" content="Tara na sa Alabat! | Home">
    <meta property="og:description" content="Discover the beauty and organic products of Alabat Island.">
    <meta property="og:image" content="https://alabatcoconetwork.github.io/Tara-Na-Sa-Alabat/ariya.jpg">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* --- LOCAL FONT --- */
        @font-face {
            font-family: 'Barabara';
            src: url('BARABARA-final.otf') format('opentype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #ffffff;
            color: #222;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- PHILIPPINE FLAG TOP BAR --- */
        .top-accent {
            height: 6px;
            background: linear-gradient(90deg, #0038A8 25%, #CE1126 25%, #CE1126 50%, #FFD300 50%, #FFD300 75%, #00AF66 75%);
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 3000;
        }

        /* --- HEADER AREA --- */
        header {
            padding: 50px 20px 15px;
            display: flex;
            justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.9)), url('background.jpg');
            background-size: cover;
            background-position: center;
        }
        .nav-logo { height: 60px; width: auto; }
        .top-left-logo { width: 55px; position: absolute; top: 20px; left: 15px; z-index: 2000; }

        /* --- STICKY NAV --- */
        nav { 
            position: sticky; top: 6px; z-index: 1000; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
        .nav-container {
            position: relative; display: flex; 
            overflow-x: auto; scrollbar-width: none;
            padding: 0 15px;
            justify-content: center;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-links { display: flex; list-style: none; gap: 5px; }
        .nav-links a {
            position: relative; z-index: 2;
            text-decoration: none; color: #0038A8; 
            font-family: 'Barabara', sans-serif; font-size: 13px;
            padding: 10px 16px; white-space: nowrap; transition: 0.3s;
            opacity: 0.7;
        }
        .nav-links a.active { opacity: 1; }

        .nav-slider {
            position: absolute; background: #FFD300;
            box-shadow: 2px 2px 0px #CE1126; border-radius: 5px;
            z-index: 1; height: 35px; top: 50%; transform: translateY(-50%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- HERO SECTION --- */
        .hero-container {
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 20px; text-align: center; gap: 40px;
            background: #fcfcfc;
        }

        .main-title { 
            font-family: 'Barabara', sans-serif;
            font-size: clamp(40px, 10vw, 85px); color: #0038A8; line-height: 0.9;
            text-transform: uppercase; margin-bottom: 15px;
        }
        .sub-title { font-size: 18px; color: #666; margin-bottom: 30px; }
        
        .btn-explore { 
            display: inline-block; padding: 14px 35px; 
            background: #CE1126; color: white; text-decoration: none;
            font-family: 'Barabara', sans-serif; border-radius: 4px;
            box-shadow: 4px 4px 0px #FFD300; transition: 0.2s;
            font-size: 16px;
        }

        /* --- MEDIA GROUP (DOT STYLE) --- */
        .media-group { width: 100%; max-width: 900px; position: relative; }

        .video-box { 
            width: 100%; border-radius: 8px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); background: #000;
            aspect-ratio: 16/9; border: 1px solid #ddd; position: relative;
        }
        .video-box iframe { width: 100%; height: 100%; border: none; }
        
        .video-label { 
            position: absolute; bottom: 80px; left: 0; z-index: 10;
            font-family: 'Barabara'; font-size: 12px; color: #fff;
            background: #0038A8; padding: 8px 20px; 
            box-shadow: 4px 0 0 #FFD300;
        }

        .video-controls { display: flex; justify-content: flex-end; gap: 10px; margin-top: -25px; position: relative; z-index: 20; padding-right: 20px; }
        .video-nav-btn {
            background: #fff; border: 1px solid #ddd; width: 50px; height: 50px;
            cursor: pointer; font-size: 20px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- PREVIEW CARDS (DOT OVERLAY STYLE) --- */
        .preview-row { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; width: 100%; margin-top: 40px; 
        }
        
        .preview-card {
            position: relative; height: 250px; border-radius: 8px; 
            overflow: hidden; text-decoration: none;
            transition: 0.4s ease; box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }
        .preview-card:hover { transform: translateY(-8px); }
        .preview-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .preview-card:hover img { transform: scale(1.1); }
        
        .card-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.85));
            color: #fff; display: flex; flex-direction: column; justify-content: flex-end;
            height: 70%;
        }
        .preview-card h3 { font-family: 'Barabara'; font-size: 22px; margin-bottom: 2px; }
        .preview-card .label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #FFD300; letter-spacing: 1px; }

        @media (min-width: 1024px) {
            .hero-container { flex-direction: row; text-align: left; padding: 80px 10%; justify-content: space-between; }
            .top-left-logo { width: 100px; }
            .media-group { max-width: 600px; }
        }
    </style>
</head>
<body>

    <div class="top-accent"></div>
    <img src="ariya.jpg" alt="Ariya" class="top-left-logo">

    <header>
        <a href="index.html">
            <img src="AlabatLogo.png" alt="Alabat Tourism" class="nav-logo">
        </a>
    </header>

    <nav>
        <div class="nav-container">
            <div class="nav-slider" id="navSlider"></div>
            <ul class="nav-links">
                <li><a href="index.html" class="active" id="activeLink">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="destinations.html">DESTINATIONS</a></li>
                <li><a href="products.html">PRODUCTS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <div class="hero-container">
        <div class="content">
            <h1 class="main-title">TARA NA SA<br>ALABAT!</h1>
            <p class="sub-title">Discover the hidden gem of Quezon Province. Experience pristine nature, local culture, and organic wonders.</p>
            <a href="about.html" class="btn-explore">EXPLORE NOW &rarr;</a>
        </div>

        <div class="media-group">
            <div class="video-box">
                <div class="video-label" id="videoLabel">ISLAND PREVIEW</div>
                <iframe 
                    id="heroVideo"
                    src="https://www.youtube.com/embed/pSD9s5_IVJk?autoplay=1&mute=0&loop=1&playlist=pSD9s5_IVJk" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="video-controls">
                <button class="video-nav-btn" onclick="prevVideo()">&#10094;</button>
                <button class="video-nav-btn" onclick="nextVideo()">&#10095;</button>
            </div>

            <div class="preview-row">
                <a href="destinations.html" class="preview-card">
                    <img src="pulongbato.jpg" alt="Pulong Bato">
                    <div class="card-overlay">
                        <p class="label">Destinations</p>
                        <h3>Pulong Bato</h3>
                    </div>
                </a>

                <a href="products.html" class="preview-card">
                    <img src="coco-sugar.jpg" alt="Coco Sugar">
                    <div class="card-overlay">
                        <p class="label">Local Products</p>
                        <h3>Coco Sugar</h3>
                    </div>
                </a>
            </div>
        </div>
    </div>

    

    <script>
        function updateNavSlider() {
            const activeLink = document.getElementById('activeLink');
            const slider = document.getElementById('navSlider');
            if (activeLink && slider) {
                slider.style.width = activeLink.offsetWidth + "px";
                slider.style.left = activeLink.offsetLeft + "px";
            }
        }
        window.addEventListener('load', updateNavSlider);
        window.addEventListener('resize', updateNavSlider);

        const heroVideo = document.getElementById('heroVideo');
        const playlist = [
            {id: "pSD9s5_IVJk", title: "ISLAND PREVIEW"}, 
            {id: "B7YRdNexH3c", title: "ALABAT ADVENTURE"}
        ];
        let vIdx = 0;

        function updateVideo() {
            const vid = playlist[vIdx];
            heroVideo.src = `https://www.youtube.com/embed/${vid.id}?autoplay=1&mute=0&loop=1&playlist=${vid.id}`;
        }

        function nextVideo() {
            vIdx = (vIdx + 1) % playlist.length;
            updateVideo();
        }

        function prevVideo() {
            vIdx = (vIdx - 1 + playlist.length) % playlist.length;
            updateVideo();
        }
    </script>
</body>
</html>
