
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tara na sa Alabat! | Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('background.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            position: relative; overflow-x: hidden;
        }

        /* --- LOGO & NAV --- */
        .top-left-logo {
            position: absolute; top: 20px; left: 20px; width: 100px; z-index: 2000;
        }

        .logo-wrapper {
            display: flex; justify-content: center; padding-top: 40px; width: 100%;
        }
        .nav-logo { height: 60px; width: auto; filter: drop-shadow(0 0 10px rgba(0,174,239,0.3)); }

        nav { 
            display: flex; justify-content: center; padding: 15px; 
            z-index: 1000; width: 100%; position: sticky; top: 0;
        }
        .nav-container {
            position: relative; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 5px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; align-items: center; gap: 2px;
        }

        .nav-container a {
            position: relative; z-index: 2; color: white; text-decoration: none;
            font-weight: 700; font-size: 10px; text-transform: uppercase;
            padding: 10px 18px; transition: 0.3s; opacity: 0.6;
        }
        .nav-container a.active { opacity: 1; }
        
        .nav-slider {
            position: absolute; height: calc(100% - 10px);
            background: rgba(255, 255, 255, 0.2); border-radius: 50px;
            top: 5px; z-index: 1; transition: 0.4s;
        }

        /* --- HERO SECTION --- */
        .hero-container {
            display: flex; flex-direction: column; align-items: center;
            width: 90%; max-width: 1200px; flex: 1; gap: 30px;
            padding: 20px 0; text-align: center;
        }

        .main-title { 
            font-size: clamp(40px, 12vw, 80px); 
            font-weight: 900; line-height: 1; text-transform: uppercase; 
        }
        .sub-title { font-size: 18px; margin: 10px 0 20px; opacity: 0.8; }
        
        .btn-explore { 
            background: #00AEEF; color: white; padding: 14px 30px; 
            border-radius: 50px; text-decoration: none; font-weight: 900; 
            font-size: 13px; text-transform: uppercase;
        }

        /* --- MEDIA GROUP --- */
        .media-group {
            width: 100%; max-width: 500px; position: relative; margin-top: 20px;
        }

        .video-box { 
            width: 100%; position: relative; border-radius: 30px; 
            border: 2px solid rgba(255,255,255,0.4); overflow: hidden; 
            background: #000; aspect-ratio: 16 / 9;
        }
        
        .video-box iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .video-label { 
            position: absolute; top: 15px; left: 20px; z-index: 10; 
            font-weight: 900; font-size: 10px; text-transform: uppercase; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); pointer-events: none;
        }

        /* --- PURE GLASS BUTTONS (Inside Video Box) --- */
        .video-nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px);
            color: white; border: 1px solid rgba(255, 255, 255, 0.4);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            z-index: 25; display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        /* Fixed Mobile Positioning: Inside the box */
        .btn-prev { left: 10px; }
        .btn-next { right: 10px; }

        .video-nav-btn:hover { background: rgba(255, 255, 255, 0.3); }

        /* --- PREVIEW SECTION --- */
        .preview-card {
            margin-top: 20px; width: 100%; background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); border-radius: 30px; padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .preview-card h3 { font-size: 16px; font-weight: 900; text-transform: uppercase; margin-top: 10px; }
        .preview-card img { width: 100%; border-radius: 20px; margin-top: 10px; }
    </style>
</head>
<body>

    <img src="ariya.jpg" alt="Logo" class="top-left-logo">

    <div class="logo-wrapper">
        <img src="AlabatLogo.png" alt="Alabat Logo" class="nav-logo">
    </div>

    <nav>
        <div class="nav-container">
            <div class="nav-slider" id="navSlider"></div>
            <a href="#" class="active" id="activeLink">HOME</a>
            <a href="#">ABOUT</a>
            <a href="#">DESTINATIONS</a>
            <a href="#">PRODUCTS</a>
        </div>
    </nav>

    <div class="hero-container">
        <div>
            <h1 class="main-title">TARA NA SA<br>ALABAT!</h1>
            <p class="sub-title">The hidden gem of Quezon!</p>
            <a href="#" class="btn-explore">EXPLORE NOW &rarr;</a>
        </div>

        <div class="media-group">
            <button class="video-nav-btn btn-prev" onclick="changeVideo(-1)">&#10094;</button>
            <button class="video-nav-btn btn-next" onclick="changeVideo(1)">&#10095;</button>

            <div class="video-box">
                <div class="video-label">ISLAND PREVIEW</div>
                <iframe 
                    id="heroVideo"
                    src="https://www.youtube.com/embed/pSD9s5_IVJk?autoplay=1&mute=1&enablejsapi=1" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="preview-card">
            <p style="font-size: 10px; opacity: 0.6; font-weight: 800;">DESTINATIONS</p>
            <img src="pulongbato.jpg" alt="Pulong Bato">
            <h3>PULONG BATO</h3>
        </div>
    </div>

    <script>
        // Fix for Navigation Slider
        function updateNavSlider() {
            const activeLink = document.getElementById('activeLink');
            const slider = document.getElementById('navSlider');
            if (activeLink && slider) {
                slider.style.width = activeLink.offsetWidth + "px";
                slider.style.left = activeLink.offsetLeft + "px";
            }
        }
        window.onload = updateNavSlider;

        // Video Navigation Fix
        const playlist = ["pSD9s5_IVJk", "TdZzwAT-FFw"];
        let vIdx = 0;

        function changeVideo(direction) {
            vIdx = (vIdx + direction + playlist.length) % playlist.length;
            const videoId = playlist[vIdx];
            // Force URL update to trigger the iframe reload
            document.getElementById('heroVideo').src = https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&enablejsapi=1;
        }
    </script>
</body>
</html>
