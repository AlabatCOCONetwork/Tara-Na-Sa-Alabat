<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Alabat Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        @font-face { font-family: 'Barabara'; src: url('BARABARA-final.otf') format('opentype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #0a0a0c; color: white; min-height: 100vh; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('ariya.png') no-repeat center center fixed; background-size: contain; padding: 10%; opacity: 0.15; z-index: -1; }
        .top-accent { height: 40px; background-image: url('topper.png'); background-size: auto 100%; background-repeat: repeat-x; width: 100%; position: fixed; top: 0; z-index: 4000; }
        
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: rgba(255,255,255,0.03); padding: 50px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); }
        .login-box h2 { font-family: 'Barabara'; color: #FFD300; letter-spacing: 1px; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 15px; margin-top: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; outline: none; }
        .login-box button { width: 100%; padding: 16px; margin-top: 25px; border-radius: 10px; border: none; background: #0038A8; color: white; font-family: 'Barabara'; cursor: pointer; }
        
        
        #admin-content { display: none; padding: 100px 30px 30px; }
        .header-area { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto 40px; }
        .nav-logo, .login-logo { height: 65px; width: auto; object-fit: contain; }
        .logout-btn { color: #ff4757; font-weight: 800; font-size: 11px; cursor: pointer; padding: 8px 18px; border-radius: 6px; border: 1px solid #ff4757; text-transform: uppercase; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 380px; gap: 30px; max-width: 1400px; margin: 0 auto; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .revenue-card { background: linear-gradient(135deg, #0038A8, #CE1126); padding: 35px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .revenue-card h3 { font-family: 'Barabara'; font-size: 14px; color: rgba(255,255,255,0.8); }
        .revenue-card p { font-size: 42px; font-weight: 900; margin-top: 5px; }
        .inventory-item, .order-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .delete-btn { color: #ff4757; background: none; border: none; cursor: pointer; font-size: 18px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 5000; }
        .modal-card { background: #16161a; padding: 40px; border-radius: 20px; width: 450px; border: 1px solid #333; }
        .modal-card input, .modal-card textarea { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; background: #000; border: 1px solid #333; color: white; }
        .action-btn { padding: 10px 16px; border-radius: 6px; border: none; font-weight: 800; font-size: 10px; cursor: pointer; text-transform: uppercase; }
        .btn-yellow { background: #FFD300; color: #000; }
    </style>
</head>
<body>

    <div class="top-accent"></div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="AlabatLogo.png" alt="Logo" class="login-logo" style="margin-bottom: 30px;">
            <h2>ADMIN PORTAL</h2>
            <input type="text" id="username" placeholder="Staff ID">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">Login to Dashboard</button>
            <p id="error-msg" style="color: #ff4757; margin-top: 15px; font-size: 11px; display: none; font-weight: 800;">ACCESS DENIED</p>
        </div>
    </div>

    <div id="admin-content">
        <header class="header-area">
            <img src="AlabatLogo.png" class="nav-logo" alt="Logo">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="text-align: right;">
                    <p style="font-size: 10px; opacity: 0.5; font-weight: 900;">SYSTEM OPERATOR</p>
                    <p style="font-size: 12px; font-weight: 700; color:#FFD300;">ALABAT_OFFICIAL_2026</p>
                </div>
                <a class="logout-btn" onclick="logout()">Logout</a>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="main-panel">
                <div class="revenue-card">
                    <div>
                        <h3>LIVE REVENUE SUMMARY</h3>
                        <p id="total-revenue">₱0.00</p>
                    </div>
                    <button class="action-btn" style="background: rgba(255,255,255,0.1); color: white;">Global Sync On</button>
                </div>

                <div class="glass-panel">
                    <h2 style="font-family: 'Barabara'; font-size: 18px; color: #FFD300; margin-bottom: 20px;">INCOMING ORDERS</h2>
                    <div id="orders-list"></div>
                </div>
            </div>

            <div class="side-panel">
                <div class="glass-panel">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <h2 style="font-family: 'Barabara'; font-size: 18px; color: #FFD300;">STOCK MGT</h2>
                        <button class="action-btn btn-yellow" onclick="showAddModal()">+ NEW ITEM</button>
                    </div>
                    <div id="inventory-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="productModal">
        <div class="modal-card">
            <h2 style="font-family: 'Barabara'; color: #FFD300; margin-bottom: 25px;">ADD NEW PRODUCT</h2>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="number" id="pPrice" placeholder="Price (Numeric)">
            <input type="text" id="pImg" placeholder="Image Filename (jam.jpg)">
            <textarea id="pDesc" placeholder="Description..." rows="3"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="action-btn" style="flex: 1; background: #333; color: white;" onclick="closeModal()">Cancel</button>
                <button class="action-btn" style="flex: 2; background: #0038A8; color: white;" onclick="saveProduct()">Sync to DB</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHmTfEQxooyvm3EK0JlDfyrBr9IEN0fuc",
            authDomain: "alabat-tourism.firebaseapp.com",
            projectId: "alabat-tourism",
            storageBucket: "alabat-tourism.firebasestorage.app",
            messagingSenderId: "438243281376",
            appId: "1:438243281376:web:ac42908ac4cf9862e0c385",
            measurementId: "G-BH765YRMQY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.checkLogin = () => {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "admin" && p === "alabat2026") {
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        };

        window.logout = () => {
            sessionStorage.removeItem('isAdmin');
            location.reload();
        };

        window.saveProduct = async () => {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pImg').value;
            const desc = document.getElementById('pDesc').value;

            if(!name || !price) return alert("Fill Name and Price");

            try {
                await addDoc(collection(db, "products"), {
                    name, price: parseFloat(price), img, desc, date: new Date()
                });
                closeModal();
            } catch (e) { alert(e.message); }
        };

        window.deleteProduct = async (id) => {
            if(confirm("Remove this item?")) {
                await deleteDoc(doc(db, "products", id));
            }
        };

        window.showAddModal = () => document.getElementById('productModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('productModal').style.display = 'none';

        if(sessionStorage.getItem('isAdmin') === 'true') {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';

            onSnapshot(collection(db, "products"), (snapshot) => {
                const list = document.getElementById('inventory-list');
                list.innerHTML = "";
                snapshot.forEach(d => {
                    const item = d.data();
                    list.innerHTML += `<div class="inventory-item">
                        <div><p><b>${item.name}</b></p><p style="color:#FFD300">₱${item.price}</p></div>
                        <button class="delete-btn" onclick="deleteProduct('${d.id}')">🗑️</button>
                    </div>`;
                });
            });

            const qOrders = query(collection(db, "orders"), orderBy("date", "desc"));
            onSnapshot(qOrders, (snapshot) => {
                const list = document.getElementById('orders-list');
                let total = 0;
                list.innerHTML = snapshot.empty ? "<p style='opacity:0.3'>No orders yet.</p>" : "";
                snapshot.forEach(d => {
                    const order = d.data();
                    total += parseFloat(order.totalAmount || 0);
                    list.innerHTML += `<div class="order-item">
                        <div><p><b>Order #${d.id.substring(0,5)}</b></p><p style="font-size:11px">${order.customerName}</p></div>
                        <p style="color:#FFD300">₱${order.totalAmount}</p>
                    </div>`;
                });
                document.getElementById('total-revenue').innerText = `₱${total.toLocaleString()}`;
            });
        }
    </script>
</body>
</html>
