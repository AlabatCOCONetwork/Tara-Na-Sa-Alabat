<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Alabat Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        @font-face { font-family: 'Barabara'; src: url('BARABARA-final.otf') format('opentype'); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f8f9fa; color: #222; min-height: 100vh; }

        /* Background Accent */
        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('ariya.jpg') no-repeat center center; 
            background-size: contain; opacity: 0.08; z-index: -1; pointer-events: none;
        }

        .top-accent { height: 40px; background-image: url('topper.png'); background-size: auto 100%; background-repeat: repeat-x; width: 100%; position: fixed; top: 0; z-index: 4000; }
        
        /* Login */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border: 1px solid #eee; }
        .login-box h2 { font-family: 'Barabara'; color: #0038A8; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 15px; margin-top: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        .login-box button { width: 100%; padding: 16px; margin-top: 25px; border-radius: 10px; border: none; background: #CE1126; color: white; font-family: 'Barabara'; cursor: pointer; box-shadow: 4px 4px 0px #FFD300; }
        
        /* Layout */
        #admin-content { display: none; padding: 100px 20px 50px; max-width: 1400px; margin: 0 auto; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 20px; border-radius: 15px; border: 1px solid #eee; }
        .nav-logo { height: 50px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 350px; gap: 25px; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 25px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .revenue-card { background: #0038A8; color: white; padding: 30px; border-radius: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 20px rgba(0,56,168,0.2); }
        .revenue-card h3 { font-family: 'Barabara'; font-size: 12px; opacity: 0.8; }
        .revenue-card p { font-size: 36px; font-weight: 900; }

        /* Order Cards */
        .order-item { background: white; border: 1px solid #eee; border-radius: 15px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; transition: transform 0.2s; cursor: zoom-in; }
        .order-item:hover { transform: scale(1.01); border-color: #0038A8; }
        
        .status-badge { font-size: 10px; font-weight: 900; padding: 5px 10px; border-radius: 4px; text-transform: uppercase; margin-top: 5px; display: inline-block; }
        .status-queue { background: #fff3cd; color: #856404; } 
        .status-ready { background: #cfe2ff; color: #084298; }  
        .status-claimed { background: #d1e7dd; color: #0f5132; } 

        .btn-group { display: flex; gap: 8px; }
        .action-btn { padding: 10px 15px; border-radius: 6px; border: none; font-weight: 800; font-size: 10px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-blue { background: #0038A8; color: white; }
        .btn-green { background: #28a745; color: white; }
        .btn-outline { border: 1px solid #ddd; background: white; color: #666; }
        .btn-active { background: #FFD300; border-color: #FFD300; color: #000; }

        .inventory-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
        .list-section-title { font-family: 'Barabara'; font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        /* Detail Modal Styling */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 5000; backdrop-filter: blur(4px); }
        .modal-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; transform: scale(0.7); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .zoom-active .modal-card { transform: scale(1); }
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
    </style>
</head>
<body>

    <div class="top-accent"></div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="AlabatLogo.png" alt="Logo" style="height: 60px; margin-bottom: 20px;">
            <h2>STAFF PORTAL</h2>
            <input type="text" id="username" placeholder="Staff Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">Enter Dashboard</button>
            <p id="error-msg" style="color: #CE1126; margin-top: 15px; font-size: 12px; display: none; font-weight: 800;">ACCESS DENIED</p>
        </div>
    </div>

    <div id="admin-content">
        <header class="header-area">
            <img src="AlabatLogo.png" class="nav-logo">
            <div style="display: flex; gap: 10px;">
                <button class="action-btn btn-outline btn-active" id="btn-active-view" onclick="toggleView('active')">Current Queue</button>
                <button class="action-btn btn-outline" id="btn-past-view" onclick="toggleView('past')">Past Orders</button>
                <button class="action-btn btn-outline" style="color:#CE1126" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="main-panel">
                <div class="revenue-card">
                    <div>
                        <h3>TOTAL COLLECTED (RECEIVED)</h3>
                        <p id="total-revenue">₱0.00</p>
                    </div>
                    <div style="text-align: right">
                        <p style="font-size: 10px; font-weight: 800;">ALABAT TOURISM</p>
                        <p id="clock" style="font-size: 12px; font-family: monospace;"></p>
                    </div>
                </div>

                <div id="active-orders-area">
                    <div class="glass-panel" style="margin-bottom: 20px; border-top: 5px solid #FFD300;">
                        <h2 class="list-section-title" style="color: #856404;">🟡 1. NEW ORDERS (QUEUE)</h2>
                        <div id="queue-list"></div>
                    </div>

                    <div class="glass-panel" style="margin-bottom: 20px; border-top: 5px solid #0038A8;">
                        <h2 class="list-section-title" style="color: #0038A8;">🔵 2. READY TO RECEIVE</h2>
                        <div id="ready-list"></div>
                    </div>
                </div>

                <div id="past-orders-area" style="display: none;">
                    <div class="glass-panel" style="border-top: 5px solid #28a745;">
                        <h2 class="list-section-title" style="color: #155724;">🟢 3. COMPLETED (PAST ORDERS)</h2>
                        <div id="past-list"></div>
                    </div>
                </div>
            </div>

            <div class="side-panel">
                <div class="glass-panel">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="font-family: 'Barabara'; font-size: 16px;">STOCKS</h2>
                    </div>
                    <div id="inventory-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="detail-modal" class="modal-overlay" onclick="closeDetail()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="modal-cust-name" style="font-family: 'Barabara'; color: #0038A8; margin-bottom: 5px;">Customer Name</h2>
            <p id="modal-order-id" style="font-size: 11px; color: #999; margin-bottom: 20px; font-family: monospace;"></p>
            
            <div id="modal-items-container">
                </div>

            <div style="margin-top: 25px; padding-top: 15px; border-top: 2px solid #f8f9fa; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 800; color: #666;">GRAND TOTAL</span>
                <span id="modal-total" style="font-size: 24px; font-weight: 900; color: #CE1126;">₱0.00</span>
            </div>
            
            <button class="action-btn btn-outline" style="width: 100%; margin-top: 25px; padding: 15px;" onclick="closeDetail()">CLOSE DETAILS</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHmTfEQxooyvm3EK0JlDfyrBr9IEN0fuc",
            authDomain: "alabat-tourism.firebaseapp.com",
            projectId: "alabat-tourism",
            storageBucket: "alabat-tourism.firebasestorage.app",
            messagingSenderId: "438243281376",
            appId: "1:438243281376:web:ac42908ac4cf9862e0c385"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global functions
        window.checkLogin = () => {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "admin" && p === "alabat2026") {
                sessionStorage.setItem('isAdmin', 'true');
                location.reload();
            } else { document.getElementById('error-msg').style.display = 'block'; }
        };

        window.logout = () => { sessionStorage.removeItem('isAdmin'); location.reload(); };

        window.toggleView = (view) => {
            const activeArea = document.getElementById('active-orders-area');
            const pastArea = document.getElementById('past-orders-area');
            const btnActive = document.getElementById('btn-active-view');
            const btnPast = document.getElementById('btn-past-view');
            if(view === 'past') {
                activeArea.style.display = 'none'; pastArea.style.display = 'block';
                btnPast.classList.add('btn-active'); btnActive.classList.remove('btn-active');
            } else {
                activeArea.style.display = 'block'; pastArea.style.display = 'none';
                btnActive.classList.add('btn-active'); btnPast.classList.remove('btn-active');
            }
        };

        window.updateStatus = async (id, nextStatus) => {
            await updateDoc(doc(db, "orders", id), { status: nextStatus });
        };

        // ZOOM DETAIL LOGIC
        window.openDetail = (orderDataJson, id) => {
            const order = JSON.parse(decodeURIComponent(orderDataJson));
            document.getElementById('modal-cust-name').innerText = order.customerName;
            document.getElementById('modal-order-id').innerText = `ORDER ID: ${id.toUpperCase()}`;
            document.getElementById('modal-total').innerText = `₱${order.totalAmount}`;
            
            const container = document.getElementById('modal-items-container');
            container.innerHTML = "";
            
            if(order.items && Array.isArray(order.items)) {
                order.items.forEach(item => {
                    container.innerHTML += `
                        <div class="item-row">
                            <span><b>${item.qty || 1}x</b> ${item.name}</span>
                            <span>₱${item.price * (item.qty || 1)}</span>
                        </div>`;
                });
            } else {
                container.innerHTML = "<p style='color:#999; font-size:13px;'>No specific item details found.</p>";
            }

            const modal = document.getElementById('detail-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('zoom-active'), 10);
        };

        window.closeDetail = () => {
            const modal = document.getElementById('detail-modal');
            modal.classList.remove('zoom-active');
            setTimeout(() => modal.style.display = 'none', 300);
        };

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        if(sessionStorage.getItem('isAdmin') === 'true') {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';

            const q = query(collection(db, "orders"), orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                const qList = document.getElementById('queue-list');
                const rList = document.getElementById('ready-list');
                const pList = document.getElementById('past-list');
                qList.innerHTML = ""; rList.innerHTML = ""; pList.innerHTML = "";
                let revenue = 0;

                snapshot.forEach(d => {
                    const order = d.data();
                    const id = d.id;
                    // FIX: If status is undefined or missing, treat as 'Queue'
                    const status = order.status || 'Queue'; 
                    const orderJson = encodeURIComponent(JSON.stringify(order));

                    const card = `
                        <div class="order-item" onclick="openDetail('${orderJson}', '${id}')">
                            <div>
                                <p style="font-size:10px; color:#999; font-family:monospace;">ID: ${id.substring(0,6).toUpperCase()}</p>
                                <p style="font-size:16px;"><b>${order.customerName}</b></p>
                                <p style="font-size:11px; color:#0038A8; font-weight:800;">${order.paymentMethod || 'Online'}</p>
                            </div>
                            <div style="text-align:right" onclick="event.stopPropagation()">
                                <p style="font-weight:900; font-size:18px; color:#CE1126; margin-bottom:10px;">₱${order.totalAmount}</p>
                                <div class="btn-group">
                                    ${status === 'Queue' ? `<button class="action-btn btn-blue" onclick="updateStatus('${id}', 'Ready')">Prepare</button>` : ''}
                                    ${status === 'Ready' ? `<button class="action-btn btn-green" onclick="updateStatus('${id}', 'Claimed')">Mark Received</button>` : ''}
                                    ${status === 'Claimed' ? `<button class="action-btn btn-outline" onclick="updateStatus('${id}', 'Queue')">Re-open</button>` : ''}
                                </div>
                            </div>
                        </div>`;

                    if(status === 'Queue') qList.innerHTML += card;
                    else if(status === 'Ready') rList.innerHTML += card;
                    else if(status === 'Claimed') {
                        pList.innerHTML += card;
                        revenue += parseFloat(order.totalAmount || 0);
                    }
                });
                document.getElementById('total-revenue').innerText = `₱${revenue.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                if(!qList.innerHTML) qList.innerHTML = "<p style='font-size:12px; opacity:0.5'>No new orders.</p>";
                if(!rList.innerHTML) rList.innerHTML = "<p style='font-size:12px; opacity:0.5'>No orders ready.</p>";
            });

            onSnapshot(collection(db, "products"), (snap) => {
                const inv = document.getElementById('inventory-list');
                inv.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    inv.innerHTML += `<div class="inventory-item"><span><b>${p.name}</b></span><span>₱${p.price}</span></div>`;
                });
            });
        }
    </script>
</body>
</html>
