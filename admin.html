<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Alabat Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        @font-face {
            font-family: 'Barabara';
            src: url('BARABARA-final.otf') format('opentype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: #0a0a0c;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- BACKGROUND PHOTO EFFECT --- */
body::before {
    content: "";
    position: fixed;
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    /* 1. Changed to ariya.png */
    background: url('ariya.png') no-repeat center center fixed;
    /* 2. Changed 'cover' to 'contain' so the logo fits the screen without cropping */
    background-size: contain; 
    /* 3. Added a small padding so the logo doesn't touch the screen edges on mobile */
    background-origin: content-box;
    padding: 10%; 
    opacity: 0.15; 
    z-index: -1;
}

        /* --- BRANDED PATTERN TOP BAR --- */
        .top-accent {
            height: 40px;
            background-image: url('topper.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 4000;
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            background: rgba(255,255,255,0.03); padding: 50px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .login-box h2 { font-family: 'Barabara'; color: #FFD300; letter-spacing: 1px; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 15px; margin-top: 12px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4);
            color: white; outline: none; transition: 0.3s;
        }
        .login-box button {
            width: 100%; padding: 16px; margin-top: 25px; border-radius: 10px;
            border: none; background: #0038A8; color: white; font-family: 'Barabara';
            cursor: pointer; transition: 0.3s;
        }

        /* --- DASHBOARD LAYOUT --- */
        #admin-content { display: none; padding: 80px 30px 30px; }
        
        .header-area { 
            display: flex; justify-content: space-between; align-items: center; 
            max-width: 1400px; margin: 0 auto 40px; 
        }
        .nav-logo { height: 60px; filter: brightness(0) invert(1); }
        .logout-btn { 
            color: #ff4757; font-weight: 800; font-size: 11px; cursor: pointer; 
            padding: 8px 18px; border-radius: 6px; border: 1px solid #ff4757;
            text-transform: uppercase; transition: 0.3s;
        }

        .dashboard-grid { 
            display: grid; grid-template-columns: 1fr 380px; gap: 30px; 
            max-width: 1400px; margin: 0 auto; 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- STAT CARDS --- */
        .revenue-card {
            background: linear-gradient(135deg, #0038A8, #CE1126);
            padding: 35px; border-radius: 20px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .revenue-card h3 { font-family: 'Barabara'; font-size: 14px; color: rgba(255,255,255,0.8); }
        .revenue-card p { font-size: 42px; font-weight: 900; margin-top: 5px; }

        /* --- TABLES & TABS --- */
        .tabs { display: flex; gap: 15px; margin-bottom: 25px; }
        .tab-btn { 
            background: none; border: none; color: white; padding: 12px 20px; 
            border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 800; opacity: 0.4;
            text-transform: uppercase; transition: 0.3s; font-family: 'Barabara';
        }
        .tab-btn.active { opacity: 1; background: #0038A8; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 10px; opacity: 0.4; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }

        /* --- STOCK ITEM STYLE --- */
        .inventory-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .delete-btn { color: #ff4757; background: none; border: none; cursor: pointer; font-size: 18px; margin-left: 10px;}

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); 
            display: none; justify-content: center; align-items: center; z-index: 5000;
        }
        .modal-card { background: #16161a; padding: 40px; border-radius: 20px; width: 450px; border: 1px solid #333; }
        .modal-card input, .modal-card textarea { 
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; 
            background: #000; border: 1px solid #333; color: white; 
        }

        .action-btn { 
            padding: 10px 16px; border-radius: 6px; border: none; 
            font-weight: 800; font-size: 10px; cursor: pointer; text-transform: uppercase; 
        }
        .btn-yellow { background: #FFD300; color: #000; }
    </style>
</head>
<body>

    <div class="top-accent"></div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="AlabatLogo.png" alt="Logo" style="height: 50px; margin-bottom: 30px; filter: brightness(0) invert(1);">
            <h2>ADMIN PORTAL</h2>
            <input type="text" id="username" placeholder="Staff ID">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">Login to Dashboard</button>
            <p id="error-msg" style="color: #ff4757; margin-top: 15px; font-size: 11px; display: none; font-weight: 800;">ACCESS DENIED</p>
        </div>
    </div>

    <div id="admin-content">
        <header class="header-area">
            <img src="AlabatLogo.png" class="nav-logo">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="text-align: right;">
                    <p style="font-size: 10px; opacity: 0.5; font-weight: 900;">SYSTEM OPERATOR</p>
                    <p style="font-size: 12px; font-weight: 700; color:#FFD300;">ALABAT_OFFICIAL_2026</p>
                </div>
                <a class="logout-btn" onclick="logout()">Logout</a>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="main-panel">
                <div class="revenue-card">
                    <div>
                        <h3>LIVE REVENUE SUMMARY</h3>
                        <p id="total-revenue">₱0.00</p>
                    </div>
                    <button class="action-btn" style="background: rgba(255,255,255,0.1); color: white;" onclick="alert('Feature coming soon')">Download Report</button>
                </div>

                <div class="glass-panel">
                    <div class="tabs">
                        <button class="tab-btn active">Incoming Orders</button>
                    </div>
                    <div style="text-align: center; padding: 40px; opacity: 0.3;">
                        <p>No active orders in queue.</p>
                    </div>
                </div>
            </div>

            <div class="side-panel">
                <div class="glass-panel">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <h2 style="font-family: 'Barabara'; font-size: 18px; color: #FFD300;">STOCK MGT</h2>
                        <button class="action-btn btn-yellow" onclick="showAddModal()">+ NEW ITEM</button>
                    </div>
                    <div id="inventory-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="productModal">
        <div class="modal-card">
            <h2 style="font-family: 'Barabara'; color: #FFD300; margin-bottom: 25px;">ADD NEW PRODUCT</h2>
            <input type="text" id="pName" placeholder="Product Name (e.g. COCO JAM)">
            <input type="text" id="pPrice" placeholder="Price (e.g. ₱150.00)">
            <input type="text" id="pImg" placeholder="Image Filename (e.g. jam.jpg)">
            <textarea id="pDesc" placeholder="Product Description..." rows="3" style="font-family:inherit;"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="action-btn" style="flex: 1; background: #333; color: white;" onclick="closeModal()">Cancel</button>
                <button class="action-btn" style="flex: 2; background: #0038A8; color: white;" onclick="saveProduct()">Push to Website</button>
            </div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "admin" && p === "alabat2026") {
                localStorage.setItem('alabat_admin', 'true');
                initDashboard();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function initDashboard() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            renderInventory();
        }

        function logout() {
            localStorage.removeItem('alabat_admin');
            location.reload();
        }

        function renderInventory() {
            // PULLS FROM THE SAME KEY PRODUCTS.HTML USES
            const inv = JSON.parse(localStorage.getItem('alabat_products')) || [];
            const container = document.getElementById('inventory-list');
            container.innerHTML = "";
            inv.forEach((item, i) => {
                container.innerHTML += `
                    <div class="inventory-item">
                        <div>
                            <p style="font-weight:800; font-size:13px;">${item.name}</p>
                            <p style="font-size:11px; color:#FFD300;">${item.price}</p>
                        </div>
                        <button class="delete-btn" onclick="deleteProduct(${i})">🗑️</button>
                    </div>`;
            });
        }

        function showAddModal() { document.getElementById('productModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
        
        function saveProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pImg').value;
            const desc = document.getElementById('pDesc').value;

            if(!name || !price) return alert("Please enter Name and Price");

            let inv = JSON.parse(localStorage.getItem('alabat_products')) || [];
            inv.push({ name, price, img, desc });
            
            localStorage.setItem('alabat_products', JSON.stringify(inv));
            renderInventory();
            closeModal();
            
            // Clear inputs
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
        }

        function deleteProduct(index) {
            if(confirm("Remove this item from the website?")) {
                let inv = JSON.parse(localStorage.getItem('alabat_products'));
                inv.splice(index, 1);
                localStorage.setItem('alabat_products', JSON.stringify(inv));
                renderInventory();
            }
        }

        window.onload = () => { if(localStorage.getItem('alabat_admin') === 'true') initDashboard(); };
    </script>
</body>
</html>
