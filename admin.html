<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Alabat Tourism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        @font-face {
            font-family: 'Barabara';
            src: url('BARABARA-final.otf') format('opentype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: #0a0a0c;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            background: rgba(255,255,255,0.03); padding: 50px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .login-box h2 { font-family: 'Barabara'; color: #FFD300; letter-spacing: 1px; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 15px; margin-top: 12px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4);
            color: white; outline: none; transition: 0.3s;
        }
        .login-box input:focus { border-color: #0038A8; box-shadow: 0 0 15px rgba(0,56,168,0.3); }
        .login-box button {
            width: 100%; padding: 16px; margin-top: 25px; border-radius: 10px;
            border: none; background: #0038A8; color: white; font-family: 'Barabara';
            cursor: pointer; transition: 0.3s;
        }
        .login-box button:hover { background: #002d86; transform: translateY(-2px); }

        /* --- DASHBOARD LAYOUT --- */
        #admin-content { display: none; padding: 30px; }
        
        .header-area { 
            display: flex; justify-content: space-between; align-items: center; 
            max-width: 1400px; margin: 0 auto 40px; 
        }
        .nav-logo { height: 45px; filter: brightness(0) invert(1); }
        .logout-btn { 
            color: #ff4757; font-weight: 800; font-size: 11px; cursor: pointer; 
            padding: 8px 18px; border-radius: 6px; border: 1px solid #ff4757;
            text-transform: uppercase; transition: 0.3s;
        }
        .logout-btn:hover { background: #ff4757; color: white; }

        .dashboard-grid { 
            display: grid; grid-template-columns: 1fr 380px; gap: 30px; 
            max-width: 1400px; margin: 0 auto; 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.08);
        }

        /* --- STAT CARDS --- */
        .revenue-card {
            background: linear-gradient(135deg, #0038A8, #CE1126);
            padding: 35px; border-radius: 20px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center;
            position: relative; overflow: hidden;
        }
        .revenue-card::after {
            content: ''; position: absolute; right: -20px; top: -20px; 
            width: 150px; height: 150px; background: rgba(255,211,0,0.1); border-radius: 50%;
        }
        .revenue-card h3 { font-family: 'Barabara'; font-size: 14px; color: rgba(255,255,255,0.8); }
        .revenue-card p { font-size: 42px; font-weight: 900; margin-top: 5px; }

        /* --- TABLES & TABS --- */
        .tabs { display: flex; gap: 15px; margin-bottom: 25px; }
        .tab-btn { 
            background: none; border: none; color: white; padding: 12px 20px; 
            border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 800; opacity: 0.4;
            text-transform: uppercase; transition: 0.3s; font-family: 'Barabara';
        }
        .tab-btn.active { opacity: 1; background: #0038A8; color: white; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 10px; text-transform: uppercase; opacity: 0.4; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }

        .status-pill { 
            padding: 4px 10px; border-radius: 4px; font-weight: 900; font-size: 10px; text-transform: uppercase;
        }
        .pill-pending { background: #FFD300; color: #000; }
        .pill-processing { background: #0038A8; color: #fff; }

        /* --- INVENTORY LIST --- */
        .inventory-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .toggle-group { display: flex; gap: 4px; background: #000; padding: 4px; border-radius: 8px; }
        .toggle-btn { 
            padding: 6px 14px; border-radius: 6px; border: none; font-size: 9px; 
            font-weight: 900; cursor: pointer; color: rgba(255,255,255,0.3); background: transparent;
        }
        .toggle-btn.active-on { background: #2ecc71; color: white; }
        .toggle-btn.active-off { background: #e74c3c; color: white; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); 
            display: none; justify-content: center; align-items: center; z-index: 5000;
        }
        .modal-card { background: #16161a; padding: 40px; border-radius: 20px; width: 450px; border: 1px solid #333; }
        .modal-card input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; background: #000; border: 1px solid #333; color: white; }
        
        .action-btn { 
            padding: 10px 16px; border-radius: 6px; border: none; 
            font-weight: 800; font-size: 10px; cursor: pointer; text-transform: uppercase; 
        }
        .btn-green { background: #2ecc71; color: white; }
        .btn-yellow { background: #FFD300; color: #000; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="AlabatLogo.png" alt="Logo" style="height: 50px; margin-bottom: 30px; filter: brightness(0) invert(1);">
            <h2>ADMIN PORTAL</h2>
            <input type="text" id="username" placeholder="Staff ID">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">Login to Dashboard</button>
            <p id="error-msg" style="color: #ff4757; margin-top: 15px; font-size: 11px; display: none; font-weight: 800;">ACCESS DENIED: INVALID CREDENTIALS</p>
        </div>
    </div>

    <div id="admin-content">
        <header class="header-area">
            <img src="AlabatLogo.png" class="nav-logo">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="text-align: right;">
                    <p style="font-size: 10px; opacity: 0.5; font-weight: 900; letter-spacing: 1px;">SYSTEM OPERATOR</p>
                    <p style="font-size: 12px; font-weight: 700;">ALABAT_OFFICIAL_2026</p>
                </div>
                <a class="logout-btn" onclick="logout()">Logout</a>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="main-panel">
                <div class="revenue-card">
                    <div>
                        <h3>LIVE REVENUE SUMMARY</h3>
                        <p id="total-revenue">₱0.00</p>
                    </div>
                    <button class="action-btn" style="background: rgba(255,255,255,0.1); color: white; backdrop-filter: blur(5px);" onclick="resetDay()">Archive History</button>
                </div>

                <div class="glass-panel">
                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab('queue', this)">Incoming Queue</button>
                        <button class="tab-btn" onclick="switchTab('completed', this)">Fulfilled</button>
                        <button class="tab-btn" onclick="switchTab('cancelled', this)">Archived</button>
                    </div>
                    
                    <div style="overflow-x: auto;">
                        <table id="order-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Customer</th>
                                    <th>Items</th>
                                    <th>Amount</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="side-panel">
                <div class="glass-panel" style="height: 100%;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <h2 style="font-family: 'Barabara'; font-size: 18px; color: #FFD300;">STOCK MGT</h2>
                        <button class="action-btn btn-yellow" style="font-size: 9px;" onclick="showAddModal()">+ NEW ITEM</button>
                    </div>
                    <div id="inventory-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="productModal">
        <div class="modal-card">
            <h2 style="font-family: 'Barabara'; color: #FFD300; margin-bottom: 25px;">NEW INVENTORY ITEM</h2>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="number" id="pPrice" placeholder="Price (PHP)">
            <input type="text" id="pImg" placeholder="Image Name (e.g. honey.jpg)">
            <input type="text" id="pContent" placeholder="Variant (e.g. 500g)">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="action-btn" style="flex: 1; background: #333; color: white;" onclick="closeModal()">Cancel</button>
                <button class="action-btn" style="flex: 2; background: #0038A8; color: white;" onclick="saveProduct()">Save to Stock</button>
            </div>
        </div>
    </div>

    <script>
        // Use the same logic as before, just ensured classes match the new UI
        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "admin" && p === "alabat2026") {
                localStorage.setItem('alabat_admin', 'true');
                initDashboard();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function initDashboard() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            renderOrders();
            renderInventory();
        }

        function logout() {
            localStorage.removeItem('alabat_admin');
            location.reload();
        }

        let currentTab = 'queue';

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderOrders();
        }

        function renderOrders() {
            const orders = JSON.parse(localStorage.getItem('alabat_orders')) || [];
            const body = document.getElementById('table-body');
            body.innerHTML = "";

            const filtered = orders.filter(o => {
                const s = o.status || 'pending';
                if(currentTab === 'queue') return s === 'pending' || s === 'processing';
                return s === currentTab;
            }).reverse();

            filtered.forEach(o => {
                const items = o.items.map(i => `${i.name} (x${i.quantity})`).join(', ');
                const statusClass = o.status === 'pending' ? 'pill-pending' : 'pill-processing';
                let actions = "";

                if(currentTab === 'queue') {
                    if(o.status === 'pending') {
                        actions = `<button class="action-btn btn-yellow" onclick="updateStatus('${o.orderID}', 'processing')">Process</button>`;
                    } else {
                        actions = `<button class="action-btn btn-green" onclick="updateStatus('${o.orderID}', 'completed')">Fulfill</button>`;
                    }
                } else {
                    actions = `<span style="font-size:10px; opacity:0.3">${o.timestamp}</span>`;
                }

                body.innerHTML += `
                    <tr>
                        <td><span style="font-weight:900; color:#FFD300;">#${o.orderID}</span></td>
                        <td><b>${o.recipient}</b><br><span style="font-size:10px; opacity:0.5;">${o.paymentMode}</span></td>
                        <td style="opacity:0.7;">${items}</td>
                        <td style="font-weight:700;">${o.total}</td>
                        <td>${actions}</td>
                    </tr>
                `;
            });
            updateRevenue();
        }

        function updateStatus(id, newStatus) {
            let orders = JSON.parse(localStorage.getItem('alabat_orders')) || [];
            const idx = orders.findIndex(o => o.orderID == id);
            if(idx !== -1) {
                orders[idx].status = newStatus;
                localStorage.setItem('alabat_orders', JSON.stringify(orders));
                renderOrders();
            }
        }

        function updateRevenue() {
            const orders = JSON.parse(localStorage.getItem('alabat_orders')) || [];
            const total = orders.filter(o => o.status === 'completed').reduce((sum, o) => {
                return sum + parseFloat(o.total.replace(/[₱,]/g, ''));
            }, 0);
            document.getElementById('total-revenue').innerText = `₱${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        function resetDay() {
            if(confirm("Archive all completed sessions?")) {
                let orders = JSON.parse(localStorage.getItem('alabat_orders')) || [];
                const active = orders.filter(o => o.status === 'pending' || o.status === 'processing');
                localStorage.setItem('alabat_orders', JSON.stringify(active));
                renderOrders();
            }
        }

        function renderInventory() {
            const inv = JSON.parse(localStorage.getItem('alabat_inventory')) || [];
            const container = document.getElementById('inventory-list');
            container.innerHTML = "";
            inv.forEach((item, i) => {
                const isAvail = item.available !== false;
                container.innerHTML += `
                    <div class="inventory-item">
                        <div>
                            <p style="font-weight:800; font-size:13px;">${item.name}</p>
                            <p style="font-size:11px; color:#FFD300;">${item.price}</p>
                        </div>
                        <div class="toggle-group">
                            <button class="toggle-btn ${isAvail ? 'active-on' : ''}" onclick="toggleAvail(${i}, true)">IN</button>
                            <button class="toggle-btn ${!isAvail ? 'active-off' : ''}" onclick="toggleAvail(${i}, false)">OUT</button>
                        </div>
                    </div>`;
            });
        }

        function toggleAvail(index, state) {
            let inv = JSON.parse(localStorage.getItem('alabat_inventory'));
            inv[index].available = state;
            localStorage.setItem('alabat_inventory', JSON.stringify(inv));
            renderInventory();
        }

        function showAddModal() { document.getElementById('productModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
        
        function saveProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            if(!name || !price) return;
            let inv = JSON.parse(localStorage.getItem('alabat_inventory')) || [];
            inv.push({ name, price: `₱${parseFloat(price).toFixed(2)}`, img: document.getElementById('pImg').value || 'default.jpg', content: document.getElementById('pContent').value || 'N/A', available: true });
            localStorage.setItem('alabat_inventory', JSON.stringify(inv));
            renderInventory();
            closeModal();
        }

        window.onload = () => { if(localStorage.getItem('alabat_admin') === 'true') initDashboard(); };
    </script>
</body>
</html>
